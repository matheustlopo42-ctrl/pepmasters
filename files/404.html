<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Página não encontrada — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--warm-white);border-bottom:3px solid var(--amber);padding:0 24px;height:68px;display:flex;align-items:center}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-wrap img{height:40px;width:40px;object-fit:contain}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
    .err-box{max-width:500px}
    .err-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:10rem;line-height:1;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .err-box h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;text-transform:uppercase;color:var(--dark);margin-bottom:10px}
    .err-box p{font-size:.95rem;color:var(--muted);line-height:1.6;margin-bottom:28px}
    .btn{display:inline-block;padding:13px 36px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border-radius:50px;box-shadow:0 4px 16px rgba(232,34,10,.3);transition:transform .15s}
    .btn:hover{transform:translateY(-1px)}
    footer{background:var(--dark);color:rgba(255,255,255,.4);text-align:center;padding:16px;font-size:.8rem}
    footer a{color:rgba(255,179,0,.5);text-decoration:none}
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap"><img src="Capturar.PNG" alt="Logo"/><span class="logo-text">PEPMASTERS</span></a>
</header>
<main>
  <div class="err-box">
    <div class="err-num">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura não existe ou foi movida. Que tal voltar para a loja e conferir nossos produtos?</p>
    <a href="index.html" class="btn">Voltar à loja</a>
  </div>
</main>
<footer>© 2025 PEPMASTERS — <a href="index.html">Voltar à loja</a></footer>
</body>
</html>
