<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amber: #FFB300; --red: #E8220A; --orange: #FF6B00;
      --cream: #FFF8F0; --warm-white: #FFFDF9; --dark: #1C0A00;
      --mid: #3D1A00; --muted: #7A4A2A; --border: #FFD580;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--warm-white); border-bottom: 3px solid var(--amber); box-shadow: 0 2px 20px rgba(255,179,0,0.2); padding: 0 24px; height: 68px; display: flex; align-items: center; }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-wrap img { height: 40px; width: 40px; object-fit: contain; }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.5rem; letter-spacing: 0.04em; background: linear-gradient(135deg, var(--red), var(--orange), var(--amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card { background: #fff; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 460px; border: 1px solid #FFE5B0; box-shadow: 0 8px 40px rgba(255,107,0,0.10); }
    .auth-card h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--dark); margin-bottom: 4px; }
    .subtitle { font-size: 0.88rem; color: var(--muted); margin-bottom: 28px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--mid); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-family: 'Barlow', sans-serif; color: var(--dark); background: var(--warm-white); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--orange); }
    .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.1em; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 16px rgba(232,34,10,0.3); transition: transform 0.15s; margin-top: 8px; }
    .btn-primary:hover { transform: translateY(-1px); }
    .auth-footer { margin-top: 20px; text-align: center; font-size: 0.88rem; color: var(--muted); }
    .auth-footer a { color: var(--orange); text-decoration: none; font-weight: 600; }
    #msgErro { background: #FFF0EE; border-left: 4px solid var(--red); padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; color: var(--red); margin-bottom: 18px; display: none; }
    #msgOk { background: #F0FFF4; border-left: 4px solid #22c55e; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; color: #15803d; margin-bottom: 18px; display: none; }
    footer { background: var(--dark); color: rgba(255,255,255,0.4); text-align: center; padding: 16px; font-size: 0.8rem; }
    footer a { color: rgba(255,179,0,0.5); text-decoration: none; }
    footer a:hover { color: var(--amber); }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo-wrap">
    <img src="Capturar.PNG" alt="Logo" />
    <span class="logo-text">PEPMASTERS</span>
  </a>
</header>

<main>
  <div class="auth-card">
    <h1>Criar Conta</h1>
    <p class="subtitle">Cadastre-se para acompanhar seus pedidos</p>

    <div id="msgErro"></div>
    <div id="msgOk"></div>

    <div class="form-row">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome" />
      </div>
      <div class="form-group">
        <label>Sobrenome</label>
        <input type="text" id="sobrenome" placeholder="Sobrenome" />
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="seu@email.com" />
    </div>

    <div class="form-group">
      <label>CPF</label>
      <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" />
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Confirmar</label>
        <input type="password" id="confirmar" placeholder="••••••••" />
      </div>
    </div>

    <button class="btn-primary" onclick="cadastrar()">Criar conta</button>

    <div class="auth-footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
  </div>
</main>

<footer>© 2025 PEPMASTERS — <a href="index.html">Voltar à loja</a></footer>

<script>
  // Máscara CPF
  document.getElementById('cpf').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length > 11) v = v.slice(0,11);
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    this.value = v;
  });

  // Máscara Telefone
  document.getElementById('telefone').addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'');
    if (v.length > 11) v = v.slice(0,11);
    if (v.length > 6) v = v.replace(/^(\d{2})(\d{5})(\d{0,4}).*/, '($1) $2-$3');
    else if (v.length > 2) v = v.replace(/^(\d{2})(\d*)/, '($1) $2');
    this.value = v;
  });

  async function cadastrar() {
    const nome      = document.getElementById('nome').value.trim();
    const sobrenome = document.getElementById('sobrenome').value.trim();
    const email     = document.getElementById('email').value.trim();
    const cpf       = document.getElementById('cpf').value.trim();
    const telefone  = document.getElementById('telefone').value.trim();
    const senha     = document.getElementById('senha').value;
    const confirmar = document.getElementById('confirmar').value;

    if (!nome || !sobrenome || !email || !cpf || !senha) { mostrarErro('Preencha todos os campos obrigatórios.'); return; }
    if (senha !== confirmar) { mostrarErro('As senhas não conferem.'); return; }
    if (senha.length < 6) { mostrarErro('A senha deve ter pelo menos 6 caracteres.'); return; }

    try {
      const res  = await fetch('/api/cadastro', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome: nome + ' ' + sobrenome, email, cpf, telefone, senha })
      });
      const data = await res.json();
      if (!res.ok) { mostrarErro(data.erro || 'Erro ao cadastrar.'); return; }

      localStorage.setItem('pep_token', data.token);
      localStorage.setItem('pep_nome',  data.nome);
      mostrarOk('Conta criada! Redirecionando...');
      setTimeout(() => location.href = 'index.html', 1500);
    } catch {
      mostrarErro('Erro de conexão. Tente novamente.');
    }
  }

  function mostrarErro(msg) {
    const el = document.getElementById('msgErro');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('msgOk').style.display = 'none';
  }

  function mostrarOk(msg) {
    const el = document.getElementById('msgOk');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('msgErro').style.display = 'none';
  }
</script>
</body>
</html>
