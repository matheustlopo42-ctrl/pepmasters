<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Estoque — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--dark);min-height:100vh;color:#fff}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:#110500;border-right:2px solid rgba(255,179,0,.15);padding:24px 0;display:flex;flex-direction:column}
    .sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 20px 24px;border-bottom:1px solid rgba(255,179,0,.1)}
    .sidebar-logo img{height:32px;width:32px;object-fit:contain}
    .sidebar-logo span{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sidebar-badge{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,179,0,.5);padding:0 20px;margin-top:8px;margin-bottom:4px}
    .sidebar a{display:block;padding:11px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:all .2s;border-left:3px solid transparent}
    .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,179,0,.08);border-left-color:var(--amber)}
    .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,179,0,.1)}
    .sidebar-footer a{font-size:.82rem;color:rgba(255,255,255,.3);text-decoration:none}
    .sidebar-footer a:hover{color:var(--amber)}
    .main{margin-left:220px;padding:32px}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;text-transform:uppercase;margin-bottom:24px}
    .table-wrap{background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,179,0,.1);overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{padding:12px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,179,0,.7);border-bottom:1px solid rgba(255,179,0,.1)}
    td{padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
    tr:last-child td{border:none}
    .estoque-input{background:rgba(255,255,255,.07);border:1px solid rgba(255,179,0,.2);border-radius:8px;padding:7px 10px;color:#fff;font-size:.9rem;width:90px;font-family:'Barlow',sans-serif;outline:none}
    .estoque-input:focus{border-color:var(--orange)}
    .btn-save{padding:7px 16px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;text-transform:uppercase}
    .badge-ok{background:#14532d;color:#4ade80;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase}
    .badge-low{background:#713f12;color:#fbbf24;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase}
    .badge-zero{background:#450a0a;color:#f87171;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;border-left:4px solid var(--amber);box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(10px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="Capturar.PNG" alt="Logo"/><span>PEPMASTERS</span></div>
  <div class="sidebar-badge">Admin</div>
  <a href="admin.html">📋 Pedidos</a>
  <a href="admin-cupons.html">🏷️ Cupons</a>
  <a href="admin-estoque.html" class="active">📦 Estoque</a>
  <a href="admin-usuarios.html">👥 Usuários</a>
  <div class="sidebar-footer"><a href="index.html">← Ver loja</a></div>
</div>

<div class="main">
  <h1>📦 Controle de Estoque</h1>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Produto</th><th>Estoque Atual</th><th>Alerta Mínimo</th><th>Situação</th><th>Atualizar</th></tr></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>
<script>
  const token = localStorage.getItem('pep_admin_token');
  if (!token) location.href = 'admin-login.html';

  async function carregar() {
    try {
      const res  = await fetch('/api/admin/estoque', { headers: { Authorization: 'Basic ' + token } });
      const data = await res.json();
      const tb   = document.getElementById('tBody');
      tb.innerHTML = '';
      data.forEach(p => {
        const qt = parseInt(p.estoque || 0);
        const mn = parseInt(p.alerta_minimo || 3);
        const badge = qt === 0 ? '<span class="badge-zero">Esgotado</span>' : qt <= mn ? '<span class="badge-low">Estoque baixo</span>' : '<span class="badge-ok">OK</span>';
        tb.innerHTML += `
          <tr>
            <td><strong>${p.nome}</strong></td>
            <td>${qt}</td>
            <td><input class="estoque-input" type="number" id="min-${p.id}" value="${mn}" min="0" style="width:70px"/></td>
            <td>${badge}</td>
            <td style="display:flex;gap:8px;align-items:center">
              <input class="estoque-input" type="number" id="qt-${p.id}" value="${qt}" min="0"/>
              <button class="btn-save" onclick="salvar(${p.id})">Salvar</button>
            </td>
          </tr>
        `;
      });
    } catch { showToast('Erro ao carregar.'); }
  }

  async function salvar(id) {
    const estoque       = parseInt(document.getElementById('qt-' + id).value);
    const alerta_minimo = parseInt(document.getElementById('min-' + id).value);
    try {
      await fetch('/api/admin/estoque/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
        body: JSON.stringify({ estoque, alerta_minimo })
      });
      showToast('Estoque atualizado!');
      carregar();
    } catch { showToast('Erro ao salvar.'); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  carregar();
</script>
</body>
</html>
