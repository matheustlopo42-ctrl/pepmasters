<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Extrato — PEPMASTERS Members</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--dark:#1C0A00}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:#0f0800;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    header{background:rgba(28,10,0,.95);border-bottom:2px solid var(--amber);padding:0 24px;height:68px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .members-badge{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;background:linear-gradient(135deg,var(--amber),var(--orange));color:#000;padding:3px 10px;border-radius:20px;margin-left:8px}
    .header-right{display:flex;align-items:center;gap:16px}
    .nav-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}
    .nav-link:hover,.nav-link.active{color:var(--amber)}
    main{flex:1;max-width:860px;margin:0 auto;padding:32px 24px;width:100%}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;text-transform:uppercase;color:var(--amber);margin-bottom:24px}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
    .stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,179,0,.1);border-radius:12px;padding:18px}
    .stat-card .label{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:6px}
    .stat-card .value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;color:var(--amber)}
    /* TABS */
    .tabs{display:flex;gap:8px;margin-bottom:20px}
    .tab-btn{padding:8px 20px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:none;color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .tab-btn.active{border-color:var(--amber);color:var(--amber);background:rgba(255,179,0,.06)}
    /* TABELA */
    .table-wrap{background:rgba(255,255,255,.03);border:1px solid rgba(255,179,0,.08);border-radius:14px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(0,0,0,.2)}
    td{padding:12px 16px;font-size:.88rem;color:rgba(255,255,255,.8);border-bottom:1px solid rgba(255,255,255,.04)}
    tr:last-child td{border:none}
    .badge-pago{background:rgba(34,197,94,.15);color:#22c55e;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase}
    .badge-pendente{background:rgba(234,179,8,.15);color:#eab308;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase}
    .valor-comissao{color:#22c55e;font-weight:700}
    .empty{text-align:center;padding:40px;color:rgba(255,255,255,.3)}
    #toast{position:fixed;bottom:24px;right:24px;background:#1a0c00;color:#fff;padding:12px 18px;border-radius:10px;font-size:.85rem;border-left:3px solid var(--amber);box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(20px);opacity:0;transition:all .3s;z-index:5000;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    @media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="index.html" style="text-decoration:none"><span class="logo-text">PEPMASTERS</span></a>
    <span class="members-badge">Members</span>
  </div>
  <div class="header-right">
    <a href="members.html" class="nav-link" data-i18n="members.nav.panel">Painel</a>
    <a href="members-conteudo.html" class="nav-link" data-i18n="content.nav.content">Conteúdo</a>
    <a href="members-forum.html" class="nav-link" data-i18n="members.nav.forum">Fórum</a>
    <a href="members-ranking.html" class="nav-link" data-i18n="members.nav.ranking">🏆 Ranking</a>
    <a href="members-extrato.html" class="nav-link active" data-i18n="members.nav.extrato" class="nav-link active">💳 Extrato</a>
    <a href="members-perfil-publico.html" class="nav-link" data-i18n="members.nav.perfil">👤 Perfil</a>
    <a href="index.html" class="nav-link" data-i18n="members.nav.store">← Loja</a>
    <a href="#" class="nav-link" onclick="sair(event)" data-i18n="members.nav.logout">Sair</a>
  </div>
</header>

<main>
  <h1>💳 <span data-nav="extrato">Extrato</span></h1>
  <div class="stats-grid">
    <div class="stat-card"><div class="label" data-nav="vol">Volume Total</div><div class="value" id="statVolume">—</div></div>
    <div class="stat-card"><div class="label" data-nav="com">Comissão Total</div><div class="value" id="statComissao">—</div></div>
    <div class="stat-card"><div class="label" data-nav="sal">Total de Vendas</div><div class="value" id="statVendas">—</div></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="mostrarTab('vendas',this)" data-i18n="extrato.tab.sales">💰 Vendas</button>
    <button class="tab-btn" onclick="mostrarTab('pagamentos',this)" data-i18n="extrato.tab.payments">📋 Mensalidades</button>
    <button class="tab-btn" onclick="mostrarTab('links',this)" data-i18n="extrato.tab.links">🔗 Links por Produto</button>
  </div>
  <div id="tabVendas"></div>
  <div id="tabPagamentos" style="display:none"></div>
  <div id="tabLinks" style="display:none"></div>
</main>

<div id="toast"></div>

<script>
var token = localStorage.getItem('pep_token');
var dadosExtrato = null;
var dadosLinks = null;

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function sair(e){e.preventDefault();localStorage.removeItem('pep_token');localStorage.removeItem('pep_nome');location.href='index.html';}
function fmt(v){ return 'R$ ' + parseFloat(v||0).toFixed(2).replace('.',','); }

function mostrarTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('tabVendas').style.display = tab === 'vendas' ? 'block' : 'none';
  document.getElementById('tabPagamentos').style.display = tab === 'pagamentos' ? 'block' : 'none';
  document.getElementById('tabLinks').style.display = tab === 'links' ? 'block' : 'none';
  if (tab === 'links' && !dadosLinks) carregarLinks();
}

function copiarLink(txt) {
  var d=window.PEPMASTERS_I18N||{};var l=localStorage.getItem('pep_lang')||'en';
  var tr=function(k){return(d[k]&&(d[k][l]||d[k]['en']))||k;};
  navigator.clipboard.writeText(txt).then(function(){ showToast(tr('extrato.link.copied')); });
}

async function carregarLinks() {
  try {
    var res = await fetch('/api/membros/links', {headers:{Authorization:'Bearer '+token}});
    var lista = await res.json();
    var el = document.getElementById('tabLinks');
    if (!lista.length) { el.innerHTML = '<div class="empty">No products available.</div>'; return; }
    dadosLinks = lista;
    el.innerHTML = '<div class="table-wrap"><table><thead><tr><th>Produto</th><th>Link de Afiliado</th><th></th></tr></thead><tbody>' +
    lista.map(function(l){
      return '<tr><td style="font-weight:600">'+l.nome+'</td>' +
        '<td style="font-size:.78rem;color:rgba(255,255,255,.4);max-width:300px;word-break:break-all">'+l.link+'</td>' +
        '<td><button onclick="copiarLink(\''+l.link+'\')" style="padding:5px 12px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:.75rem;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer">Copiar</button></td>' +
      '</tr>';
    }).join('') +
    '</tbody></table></div>';
  } catch { showToast('Erro ao carregar links.'); }
}


// Traduzir navegação diretamente
function traduzirNav() {
  var l = localStorage.getItem('pep_lang') || 'en';
  var nav = {
    en:{panel:'Panel',ranking:'Ranking',extrato:'Statement',forum:'Forum',logout:'Logout',content:'Content'},
    pt:{panel:'Painel',ranking:'Ranking',extrato:'Extrato',forum:'Fórum',logout:'Sair',content:'Conteúdo'},
    es:{panel:'Panel',ranking:'Ranking',extrato:'Extracto',forum:'Foro',logout:'Salir',content:'Contenido'},
    de:{panel:'Panel',ranking:'Ranking',extrato:'Auszug',forum:'Forum',logout:'Abmelden',content:'Inhalt'},
    fr:{panel:'Panneau',ranking:'Classement',extrato:'Relevé',forum:'Forum',logout:'Déconnexion',content:'Contenu',
       vol:'Volume Total',com:'Commission Totale',sal:'Total des ventes',
       tabs:'💰 Ventes|📋 Abonnements|🔗 Liens par Produit'},
    extras:{
      en:{vol:'Total Volume',com:'Total Commission',sal:'Total Sales',tabs:'💰 Sales|📋 Memberships|🔗 Links by Product'},
      pt:{vol:'Volume Total',com:'Comissão Total',sal:'Total de Vendas',tabs:'💰 Vendas|📋 Mensalidades|🔗 Links por Produto'},
      es:{vol:'Volumen Total',com:'Comisión Total',sal:'Total de Ventas',tabs:'💰 Ventas|📋 Membresías|🔗 Links por Producto'},
      de:{vol:'Gesamtvolumen',com:'Gesamtprovision',sal:'Gesamtverkäufe',tabs:'💰 Verkäufe|📋 Mitgliedschaften|🔗 Links nach Produkt'},
      fr:{vol:'Volume Total',com:'Commission Totale',sal:'Total des ventes',tabs:'💰 Ventes|📋 Abonnements|🔗 Liens par Produit'}
    }
  };
  var t = nav[l] || nav['en'];
  document.querySelectorAll('[data-nav]').forEach(function(el){
    var k = el.getAttribute('data-nav');
    var ext = nav.extras && nav.extras[l];
    var val = t[k] || (ext && ext[k]);
    if(val) el.textContent = val;
  });
  // Traduzir tabs
  var tabs = document.querySelectorAll('.tab-btn');
  var ext2 = nav.extras && nav.extras[l];
  if(ext2 && ext2.tabs) {
    var tabLabels = ext2.tabs.split('|');
    tabs.forEach(function(tab, i){ if(tabLabels[i]) tab.textContent = tabLabels[i]; });
  }
}
window.addEventListener('pep_lang_change', traduzirNav);

async function init() {
  traduzirNav();
  if (!token) { location.href = 'login.html?redirect=members-extrato.html'; return; }
  try {
    var res = await fetch('/api/membros/extrato', {headers:{Authorization:'Bearer '+token}});
    if (res.status === 401) { location.href = 'login.html?redirect=members-extrato.html'; return; }
    if (res.status === 403) { location.href = 'members.html?msg=assine'; return; }
    var data = await res.json();
    dadosExtrato = data;

    document.getElementById('statVolume').textContent = fmt(data.total_volume);
    document.getElementById('statComissao').textContent = fmt(data.total_comissao);
    document.getElementById('statVendas').textContent = data.vendas.length;
    renderVendas(data.vendas);
    renderPagamentos(data.pagamentos);
  } catch(e) { showToast('Erro ao carregar extrato.'); }
}

function tr(k){var d=window.PEPMASTERS_I18N||{};var l=localStorage.getItem('pep_lang')||'en';return(d[k]&&(d[k][l]||d[k]['en']))||k;}

function renderVendas(vendas) {
  var el = document.getElementById('tabVendas');
  if (!vendas.length) {
    el.innerHTML = '<div class="empty">'+tr('extrato.empty.sales')+'</div>';
    return;
  }
  el.innerHTML = '<div class="table-wrap"><table><thead><tr><th>'+tr('extrato.date')+'</th><th>'+tr('extrato.product')+'</th><th>'+tr('extrato.value')+'</th><th>'+tr('extrato.commission.col')+'</th></tr></thead><tbody>' +
  vendas.map(function(v){
    return '<tr><td>'+new Date(v.criado_em).toLocaleDateString()+'</td><td>'+(v.produto_nome||'—')+'</td><td>'+fmt(v.valor)+'</td><td class="valor-comissao">+'+fmt(v.comissao)+'</td></tr>';
  }).join('') + '</tbody></table></div>';
}

function renderPagamentos(pagamentos) {
  var el = document.getElementById('tabPagamentos');
  if (!pagamentos.length) {
    el.innerHTML = '<div class="empty">'+tr('extrato.empty.payments')+'</div>';
    return;
  }
  el.innerHTML = '<div class="table-wrap"><table><thead><tr><th>'+tr('extrato.date')+'</th><th>'+tr('extrato.value')+'</th><th>'+tr('extrato.method')+'</th><th>'+tr('extrato.status')+'</th></tr></thead><tbody>' +
  pagamentos.map(function(p){
    var sc = p.status === 'pago' ? 'badge-pago' : 'badge-pendente';
    return '<tr><td>'+new Date(p.criado_em).toLocaleDateString()+'</td><td>'+fmt(p.valor)+'</td><td>'+(p.pagamento||'—')+'</td><td><span class="'+sc+'">'+p.status+'</span></td></tr>';
  }).join('') + '</tbody></table></div>';
}

</script>
<script src="i18n.js"></script>
<script src="i18n-init.js"></script>
<script>
(function waitI18n(){
  if(window.PEPMASTERS_I18N){
    // Traduzir elementos data-i18n
    var d=window.PEPMASTERS_I18N;
    var l=localStorage.getItem('pep_lang')||'en';
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var val=d[el.getAttribute('data-i18n')];
      val=val&&(val[l]||val['en']);
      if(val) el.textContent=val;
    });
    // Re-traduzir ao mudar idioma — re-renderiza tabelas completas
    window.addEventListener('pep_lang_change',function(){
      if (dadosExtrato) {
        renderVendas(dadosExtrato.vendas);
        renderPagamentos(dadosExtrato.pagamentos);
        traduzirNav();
      }
    });
    // Aplicar traduções diretas
    var _nav_keys = {
      'members.nav.panel': {en:'Panel',pt:'Painel',es:'Panel',de:'Panel',fr:'Panneau'},
      'members.nav.forum': {en:'Forum',pt:'Fórum',es:'Foro',de:'Forum',fr:'Forum'},
      'members.nav.logout': {en:'Logout',pt:'Sair',es:'Salir',de:'Abmelden',fr:'Déconnexion'},
      'ranking.title': {en:'Ranking',pt:'Ranking',es:'Ranking',de:'Ranking',fr:'Classement'},
      'extrato.title': {en:'Statement',pt:'Extrato',es:'Extracto',de:'Auszug',fr:'Relevé'},
      'extrato.tab.sales': {en:'💰 Sales',pt:'💰 Vendas',es:'💰 Ventas',de:'💰 Verkäufe',fr:'💰 Ventes'},
      'extrato.tab.payments': {en:'📋 Memberships',pt:'📋 Mensalidades',es:'📋 Membresías',de:'📋 Mitgliedschaften',fr:'📋 Abonnements'},
      'extrato.tab.links': {en:'🔗 Links by Product',pt:'🔗 Links por Produto',es:'🔗 Links por Producto',de:'🔗 Links nach Produkt',fr:'🔗 Liens par Produit'},
      'extrato.volume': {en:'Total Volume',pt:'Volume Total',es:'Volumen Total',de:'Gesamtvolumen',fr:'Volume Total'},
      'extrato.commission': {en:'Total Commission',pt:'Comissão Total',es:'Comisión Total',de:'Gesamtprovision',fr:'Commission Totale'},
      'extrato.sales': {en:'Total Sales',pt:'Total de Vendas',es:'Total de Ventas',de:'Gesamtverkäufe',fr:'Total des ventes'},
    };
    document.querySelectorAll('[data-i18n]').forEach(function(el){
      var key = el.getAttribute('data-i18n');
      var map = d[key] || _nav_keys[key];
      if(map){ var v=map[l]||map['en']; if(v) el.textContent=v; }
    });
    init();
  } else {
    setTimeout(waitI18n,50);
  }
})();
</script>
</body>
</html>
