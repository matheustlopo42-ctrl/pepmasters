<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Chat — PEPMASTERS Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column}
    header{background:var(--warm-white);border-bottom:3px solid var(--amber);padding:0 20px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(255,179,0,.15)}
    .logo-wrap{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
    .logo-wrap img{height:34px;width:34px;object-fit:contain}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.25rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .club-badge{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.65rem;letter-spacing:.08em;padding:2px 7px;border-radius:4px;text-transform:uppercase}
    .back-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-decoration:none}
    .back-link:hover{color:var(--orange)}

    /* LAYOUT */
    .chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 64px);max-width:1100px;margin:0 auto;width:100%;gap:0}

    /* LISTA DE CHATS */
    .chats-list{border-right:2px solid var(--border);background:#fff;overflow-y:auto}
    .chats-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .chats-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;text-transform:uppercase;color:var(--dark)}
    .btn-novo-chat{padding:6px 12px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;border:none;border-radius:7px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;text-transform:uppercase;cursor:pointer}
    .chat-item{padding:14px 18px;border-bottom:1px solid #FFE5B0;cursor:pointer;transition:background .15s}
    .chat-item:hover{background:#FFF3E0}
    .chat-item.active{background:#FFF3E0;border-left:3px solid var(--orange)}
    .chat-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
    .chat-item-nome{font-weight:700;font-size:.88rem;color:var(--dark)}
    .chat-item-hora{font-size:.68rem;color:var(--muted)}
    .chat-item-msg{font-size:.78rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge-nao-lida{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.65rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-left:6px}
    .chat-item-sub{font-size:.7rem;color:var(--orange);margin-bottom:2px}
    .empty-chats{text-align:center;padding:40px 20px;color:var(--muted);font-size:.85rem}

    /* ÁREA DA CONVERSA */
    .chat-area{display:flex;flex-direction:column;background:var(--cream)}
    .chat-header{padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
    .chat-header-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--orange));display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;color:#fff;flex-shrink:0}
    .chat-header-info{flex:1}
    .chat-header-nome{font-weight:700;font-size:.95rem;color:var(--dark)}
    .chat-header-sub{font-size:.72rem;color:var(--muted)}
    .chat-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
    .msg-wrap{display:flex;align-items:flex-end;gap:8px}
    .msg-wrap.eu{flex-direction:row-reverse}
    .msg-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--orange));display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
    .msg-avatar.eu{background:linear-gradient(135deg,#1e40af,#3b82f6)}
    .msg-bubble{max-width:68%;padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.5}
    .msg-bubble.eu{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;border-bottom-right-radius:4px}
    .msg-bubble.outro{background:#fff;color:var(--dark);border:1px solid #FFE5B0;border-bottom-left-radius:4px}
    .msg-nome{font-size:.68rem;font-weight:700;margin-bottom:3px;opacity:.7}
    .msg-hora{font-size:.62rem;opacity:.6;margin-top:3px;text-align:right}
    .chat-input-wrap{padding:14px 16px;background:#fff;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
    .chat-input{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-size:.9rem;font-family:'Barlow',sans-serif;color:var(--dark);outline:none;resize:none;max-height:120px;transition:border-color .2s;background:var(--warm-white)}
    .chat-input:focus{border-color:var(--orange)}
    .btn-enviar{padding:10px 18px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;text-transform:uppercase;cursor:pointer;flex-shrink:0;transition:opacity .2s}
    .btn-enviar:hover{opacity:.88}
    .chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.9rem;text-align:center;padding:40px}

    /* NOVO CHAT MODAL */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px}
    .modal-overlay.open{display:flex}
    .modal-box{background:#fff;border-radius:18px;padding:28px;max-width:460px;width:100%;border-top:4px solid var(--amber)}
    .modal-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;color:var(--dark);margin-bottom:18px}
    label{display:block;font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);margin-bottom:5px;margin-top:12px}
    input,select,textarea{width:100%;padding:10px 13px;border:2px solid var(--border);border-radius:10px;font-size:.9rem;font-family:'Barlow',sans-serif;color:var(--dark);background:var(--warm-white);outline:none;transition:border-color .2s}
    input:focus,select:focus,textarea:focus{border-color:var(--orange)}
    select option{background:#fff}
    .btn-criar{width:100%;padding:12px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;text-transform:uppercase;cursor:pointer;margin-top:16px}
    .btn-cancel{width:100%;padding:10px;background:none;border:2px solid var(--border);color:var(--muted);border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;text-transform:uppercase;cursor:pointer;margin-top:8px}

    #toast{position:fixed;bottom:20px;right:20px;background:var(--dark);color:#fff;padding:10px 16px;border-radius:9px;font-size:.83rem;border-left:4px solid var(--amber);box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(10px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    #toast.success{border-left-color:#22c55e}
    #toast.error{border-left-color:var(--red)}

    @media(max-width:700px){.chat-layout{grid-template-columns:1fr}.chats-list{display:none}.chats-list.show{display:block;height:calc(100vh - 64px)}}
  </style>
</head>
<body>
<header>
  <a href="club-marketplace.html" class="logo-wrap">
    <img src="Capturar.PNG" alt="Logo"/>
    <span class="logo-text">PEPMASTERS</span>
    <span class="club-badge">Club</span>
  </a>
  <a href="club-meus-pedidos.html" class="back-link">← Meus Pedidos</a>
</header>

<div class="chat-layout">
  <!-- Lista de conversas -->
  <div class="chats-list" id="chatsList">
    <div class="chats-header">
      <div class="chats-title">💬 Conversas</div>
      <button class="btn-novo-chat" onclick="abrirNovoChat()">+ Nova</button>
    </div>
    <div id="chatsLista"></div>
  </div>

  <!-- Área da conversa -->
  <div class="chat-area" id="chatArea">
    <div class="chat-empty" id="chatEmpty">
      <div>
        <div style="font-size:2.5rem;margin-bottom:12px">💬</div>
        <div style="font-weight:600;margin-bottom:6px">Selecione uma conversa</div>
        <div style="font-size:.82rem">ou inicie uma nova</div>
      </div>
    </div>
    <div id="chatConteudo" style="display:none;flex:1;flex-direction:column;display:none">
      <div class="chat-header" id="chatHeader"></div>
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input-wrap">
        <textarea class="chat-input" id="chatInput" placeholder="Digite sua mensagem..." rows="1" onkeydown="teclaEnviar(event)" oninput="autoResize(this)"></textarea>
        <button class="btn-enviar" onclick="enviarMensagem()">Enviar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL NOVO CHAT -->
<div class="modal-overlay" id="modalNovoChat">
  <div class="modal-box">
    <div class="modal-title">💬 Nova Conversa</div>
    <label>Fornecedor</label>
    <select id="nc-fornecedor">
      <option value="">Selecione...</option>
    </select>
    <label>Pedido relacionado (opcional)</label>
    <select id="nc-pedido">
      <option value="">Sem pedido específico</option>
    </select>
    <label>Assunto</label>
    <input type="text" id="nc-assunto" placeholder="Ex: Dúvida sobre o produto"/>
    <button class="btn-criar" onclick="criarChat()">Iniciar Conversa</button>
    <button class="btn-cancel" onclick="fecharNovoChat()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>

<script src="i18n.js"></script>
<script src="i18n-init.js"></script>
<script>
const authToken = localStorage.getItem('pep_token');
const meuNome   = localStorage.getItem('pep_nome') || 'Eu';
if (!authToken) { location.href = 'login.html?redirect=club-chat.html'; }

let chatAtualId = null;
let pollingInterval = null;

// ── Carregar lista de chats ───────────────────────────────
async function carregarChats() {
  try {
    const r = await fetch('/api/club/chats', { headers: { Authorization: 'Bearer ' + authToken } });
    if (r.status === 401) { location.href = 'login.html?redirect=club-chat.html'; return; }
    const chats = await r.json();
    renderChats(chats);
  } catch(e) { console.error(e); }
}

function renderChats(chats) {
  const el = document.getElementById('chatsLista');
  if (!chats.length) {
    el.innerHTML = '<div class="empty-chats">Nenhuma conversa ainda.<br>Clique em "+ Nova" para começar.</div>';
    return;
  }
  el.innerHTML = chats.map(c => `
    <div class="chat-item ${chatAtualId===c.id?'active':''}" onclick="abrirChat(${c.id},'${c.nome_loja?.replace(/'/g,"\\'")}')">
      <div class="chat-item-sub">🏪 ${c.nome_loja}</div>
      <div class="chat-item-header">
        <div class="chat-item-nome">${c.assunto||'Conversa'} ${parseInt(c.nao_lidas)>0?`<span class="badge-nao-lida">${c.nao_lidas}</span>`:''}</div>
        <div class="chat-item-hora">${formatarHora(c.ultima_msg_em)}</div>
      </div>
      <div class="chat-item-msg">${c.ultima_msg||'—'}</div>
    </div>`).join('');
}

// ── Abrir chat ────────────────────────────────────────────
async function abrirChat(id, nome) {
  chatAtualId = id;
  document.getElementById('chatEmpty').style.display = 'none';
  const conteudo = document.getElementById('chatConteudo');
  conteudo.style.display = 'flex';
  conteudo.style.flexDirection = 'column';
  conteudo.style.flex = '1';

  document.getElementById('chatHeader').innerHTML = `
    <div class="chat-header-avatar">${nome[0].toUpperCase()}</div>
    <div class="chat-header-info">
      <div class="chat-header-nome">${nome}</div>
      <div class="chat-header-sub">Fornecedor PEPMASTERS Club</div>
    </div>`;

  await carregarMensagens(id);
  // Marcar como lidas
  fetch('/api/club/chat/' + id + '/lida', { method: 'PUT', headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + authToken }, body: JSON.stringify({ remetente: 'fornecedor' }) }).catch(()=>{});
  carregarChats();

  // Polling a cada 5s
  if (pollingInterval) clearInterval(pollingInterval);
  pollingInterval = setInterval(() => carregarMensagens(id), 5000);
}

async function carregarMensagens(chatId) {
  try {
    const r = await fetch('/api/club/chat/' + chatId + '/mensagens');
    const msgs = await r.json();
    renderMensagens(msgs);
  } catch {}
}

function renderMensagens(msgs) {
  const el = document.getElementById('chatMsgs');
  if (!msgs.length) { el.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:.85rem;padding:20px">Nenhuma mensagem ainda. Diga olá! 👋</div>'; return; }
  el.innerHTML = msgs.map(m => {
    const eu = m.remetente === 'cliente';
    return `<div class="msg-wrap ${eu?'eu':''}">
      <div class="msg-avatar ${eu?'eu':''}">${(m.remetente_nome||'?')[0].toUpperCase()}</div>
      <div class="msg-bubble ${eu?'eu':'outro'}">
        <div class="msg-nome">${m.remetente_nome||m.remetente}</div>
        ${m.texto}
        <div class="msg-hora">${formatarHora(m.criado_em)}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Enviar mensagem ───────────────────────────────────────
async function enviarMensagem() {
  if (!chatAtualId) return;
  const input = document.getElementById('chatInput');
  const texto = input.value.trim();
  if (!texto) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    const r = await fetch('/api/club/chat/' + chatAtualId + '/mensagem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + authToken },
      body: JSON.stringify({ texto })
    });
    if (r.ok) { await carregarMensagens(chatAtualId); carregarChats(); }
    else showToast('Erro ao enviar.', 'error');
  } catch { showToast('Erro de conexão.', 'error'); }
}

function teclaEnviar(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensagem(); }
}
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

// ── Novo chat ─────────────────────────────────────────────
async function abrirNovoChat() {
  try {
    const [forns, pedidos] = await Promise.all([
      fetch('/api/club/fornecedores').then(r=>r.json()),
      fetch('/api/club/meus-pedidos', { headers:{ Authorization:'Bearer '+authToken } }).then(r=>r.json()).catch(()=>[]),
    ]);
    const selF = document.getElementById('nc-fornecedor');
    selF.innerHTML = '<option value="">Selecione...</option>' + forns.map(f=>`<option value="${f.id}">${f.nome_loja}</option>`).join('');
    const selP = document.getElementById('nc-pedido');
    selP.innerHTML = '<option value="">Sem pedido específico</option>' + (Array.isArray(pedidos)?pedidos:[]).map(p=>`<option value="${p.id}">Pedido #${p.id} — ${p.produto_nome}</option>`).join('');
  } catch {}
  document.getElementById('modalNovoChat').classList.add('open');
}

function fecharNovoChat() { document.getElementById('modalNovoChat').classList.remove('open'); }

async function criarChat() {
  const fornId  = document.getElementById('nc-fornecedor').value;
  const pedidoId = document.getElementById('nc-pedido').value;
  const assunto = document.getElementById('nc-assunto').value.trim();
  if (!fornId) { showToast('Selecione um fornecedor.', 'error'); return; }
  try {
    const r = await fetch('/api/club/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + authToken },
      body: JSON.stringify({ fornecedor_id: parseInt(fornId), pedido_id: pedidoId?parseInt(pedidoId):null, assunto: assunto||null })
    });
    const d = await r.json();
    fecharNovoChat();
    await carregarChats();
    const fornNome = document.getElementById('nc-fornecedor').options[document.getElementById('nc-fornecedor').selectedIndex].text;
    abrirChat(d.chat_id, fornNome);
  } catch { showToast('Erro ao criar conversa.', 'error'); }
}

// ── Utilitários ───────────────────────────────────────────
function formatarHora(dt) {
  if (!dt) return '';
  const d = new Date(dt);
  const hoje = new Date();
  if (d.toDateString() === hoje.toDateString()) return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' });
}

function showToast(msg, tipo) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (tipo==='error'?' error':tipo==='success'?' success':'');
  setTimeout(() => t.className = '', 3000);
}

// Verificar se há chat_id na URL para abrir direto
const params = new URLSearchParams(location.search);
const chatIdUrl = params.get('chat');
const fornIdUrl = params.get('fornecedor');

carregarChats().then(() => {
  if (chatIdUrl) {
    const nome = params.get('nome') || 'Fornecedor';
    abrirChat(parseInt(chatIdUrl), nome);
  }
});
</script>
</body>
</html>
