<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Cupons — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--dark);min-height:100vh;color:#fff}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:#110500;border-right:2px solid rgba(255,179,0,.15);padding:24px 0;display:flex;flex-direction:column}
    .sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 20px 24px;border-bottom:1px solid rgba(255,179,0,.1)}
    .sidebar-logo img{height:32px;width:32px;object-fit:contain}
    .sidebar-logo span{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sidebar-badge{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,179,0,.5);padding:0 20px;margin-top:8px;margin-bottom:4px}
    .sidebar a{display:block;padding:11px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:all .2s;border-left:3px solid transparent}
    .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,179,0,.08);border-left-color:var(--amber)}
    .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,179,0,.1)}
    .sidebar-footer a{font-size:.82rem;color:rgba(255,255,255,.3);text-decoration:none}
    .sidebar-footer a:hover{color:var(--amber)}
    .main{margin-left:220px;padding:32px}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;text-transform:uppercase;margin-bottom:24px}
    .form-card{background:rgba(255,255,255,.04);border-radius:14px;padding:24px;border:1px solid rgba(255,179,0,.12);margin-bottom:24px}
    .form-card h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,179,0,.8);margin-bottom:18px}
    .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
    label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:5px}
    input{width:100%;padding:10px 13px;background:rgba(255,255,255,.07);border:1px solid rgba(255,179,0,.2);border-radius:8px;font-size:.9rem;color:#fff;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--orange)}
    input::placeholder{color:rgba(255,255,255,.3)}
    .btn-criar{padding:10px 24px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;margin-top:18px}
    .table-wrap{background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,179,0,.1);overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{padding:12px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,179,0,.7);border-bottom:1px solid rgba(255,179,0,.1)}
    td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
    tr:last-child td{border:none}
    .toggle-btn{padding:5px 14px;border-radius:20px;border:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
    .toggle-on{background:#14532d;color:#4ade80}
    .toggle-off{background:#450a0a;color:#f87171}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;border-left:4px solid var(--amber);box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(10px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="Capturar.PNG" alt="Logo"/><span>PEPMASTERS</span></div>
  <div class="sidebar-badge">Admin</div>
  <a href="admin.html">📋 Pedidos</a>
  <a href="admin-cupons.html" class="active">🏷️ Cupons</a>
  <a href="admin-estoque.html">📦 Estoque</a>
  <a href="admin-usuarios.html">👥 Usuários</a>
  <div class="sidebar-footer"><a href="index.html">← Ver loja</a></div>
</div>

<div class="main">
  <h1>🏷️ Cupons de Desconto</h1>

  <div class="form-card">
    <h2>Novo Cupom</h2>
    <div class="form-row">
      <div><label>Código</label><input type="text" id="c-codigo" placeholder="EX: PEPMASTERS10" style="text-transform:uppercase"/></div>
      <div><label>Desconto PIX (%)</label><input type="number" id="c-pix" placeholder="10" min="0" max="100"/></div>
      <div><label>Desconto Cartão (%)</label><input type="number" id="c-cartao" placeholder="5" min="0" max="100"/></div>
      <div><label>Usos máx. (0 = ilimitado)</label><input type="number" id="c-usos" placeholder="0" min="0"/></div>
    </div>
    <button class="btn-criar" onclick="criarCupom()">+ Criar Cupom</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Código</th><th>Desc. PIX</th><th>Desc. Cartão</th><th>Usos</th><th>Limite</th><th>Status</th><th>Ação</th></tr></thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>
<script>
  const token = localStorage.getItem('pep_admin_token');
  if (!token) location.href = 'admin-login.html';

  async function carregar() {
    try {
      const res  = await fetch('/api/admin/cupons', { headers: { Authorization: 'Basic ' + token } });
      const data = await res.json();
      const tb   = document.getElementById('tBody');
      tb.innerHTML = '';
      data.forEach(c => {
        tb.innerHTML += `
          <tr>
            <td><strong>${c.codigo}</strong></td>
            <td>${c.desconto_pix}%</td>
            <td>${c.desconto_cartao}%</td>
            <td>${c.usos || 0}</td>
            <td>${c.usos_max || '∞'}</td>
            <td><span class="${c.ativo ? 'toggle-on' : 'toggle-off'} toggle-btn">${c.ativo ? 'Ativo' : 'Inativo'}</span></td>
            <td><button class="toggle-btn ${c.ativo ? 'toggle-off' : 'toggle-on'}" onclick="toggleCupom(${c.id}, ${!c.ativo})">${c.ativo ? 'Desativar' : 'Ativar'}</button></td>
          </tr>
        `;
      });
    } catch { showToast('Erro ao carregar.'); }
  }

  async function criarCupom() {
    const codigo  = document.getElementById('c-codigo').value.trim().toUpperCase();
    const pix     = parseInt(document.getElementById('c-pix').value) || 0;
    const cartao  = parseInt(document.getElementById('c-cartao').value) || 0;
    const usos_max= parseInt(document.getElementById('c-usos').value) || 0;
    if (!codigo) { showToast('Informe o código.'); return; }
    try {
      const res = await fetch('/api/admin/cupons', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
        body: JSON.stringify({ codigo, desconto_pix: pix, desconto_cartao: cartao, usos_max })
      });
      if (res.ok) { showToast('Cupom criado!'); carregar(); }
      else { const d = await res.json(); showToast(d.erro || 'Erro.'); }
    } catch { showToast('Erro.'); }
  }

  async function toggleCupom(id, ativo) {
    try {
      await fetch('/api/admin/cupons/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
        body: JSON.stringify({ ativo })
      });
      showToast(ativo ? 'Cupom ativado!' : 'Cupom desativado!');
      carregar();
    } catch { showToast('Erro.'); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  carregar();
</script>
