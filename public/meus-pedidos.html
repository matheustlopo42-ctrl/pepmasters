<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Pedidos — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --amber: #FFB300; --red: #E8220A; --orange: #FF6B00; --cream: #FFF8F0; --warm-white: #FFFDF9; --dark: #1C0A00; --mid: #3D1A00; --muted: #7A4A2A; --border: #FFD580; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Barlow', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: var(--warm-white); border-bottom: 3px solid var(--amber); padding: 0 24px; height: 68px; display: flex; align-items: center; gap: 20px; box-shadow: 0 2px 20px rgba(255,179,0,0.2); }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-wrap img { height: 40px; width: 40px; object-fit: contain; }
    .logo-text { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.5rem; background: linear-gradient(135deg, var(--red), var(--orange), var(--amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .back-link { margin-left: auto; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); text-decoration: none; }
    .back-link:hover { color: var(--orange); }
    main { flex: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px; width: 100%; }
    h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 2rem; text-transform: uppercase; color: var(--dark); margin-bottom: 28px; }
    .pedido-card { background: #fff; border-radius: 14px; padding: 22px 24px; margin-bottom: 16px; border: 1px solid #FFE5B0; box-shadow: 0 3px 14px rgba(255,179,0,0.08); }
    .pedido-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .pedido-id { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.15rem; color: var(--dark); }
    .pedido-data { font-size: 0.82rem; color: var(--muted); }
    .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .badge-pago     { background: #DCFCE7; color: #16a34a; }
    .badge-pendente { background: #FEF9C3; color: #854d0e; }
    .badge-enviado  { background: #DBEAFE; color: #1d4ed8; }
    .badge-entregue { background: #F3E8FF; color: #7c3aed; }
    .badge-cancelado{ background: #FEE2E2; color: #b91c1c; }
    .pedido-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .info-item label { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 3px; }
    .info-item span { font-size: 0.9rem; color: var(--dark); }
    .rastrear-btn { margin-top: 14px; display: inline-block; padding: 8px 18px; border: 2px solid var(--amber); border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--mid); text-decoration: none; transition: all 0.2s; }
    .rastrear-btn:hover { background: var(--amber); color: var(--dark); }
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 1.5rem; margin-bottom: 10px; }
    footer { background: var(--dark); color: rgba(255,255,255,0.4); text-align: center; padding: 16px; font-size: 0.8rem; }
    footer a { color: rgba(255,179,0,0.5); text-decoration: none; }
      header{background:var(--warm-white);border-bottom:3px solid var(--amber);padding:0;height:68px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(255,179,0,.2)}
    .header-inner{max-width:1200px;width:100%;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
    .logo-wrap img{height:40px;width:40px;object-fit:contain}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .back-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-decoration:none;white-space:nowrap}
    .back-link:hover{color:var(--orange)}
    .back-link-mobile{display:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.2rem;color:var(--muted);text-decoration:none;padding:0 4px}
    .cart-btn{position:relative;background:none;border:2px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:var(--mid);transition:all .2s;white-space:nowrap}
    .cart-btn:hover{border-color:var(--orange);color:var(--orange)}
    .cart-count{background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;font-size:.65rem;font-weight:800;display:none;align-items:center;justify-content:center;margin-left:2px}
    .cart-count.show{display:flex}
    .btn-login{padding:5px 10px;border:2px solid var(--red);border-radius:8px;color:var(--red);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;transition:all .2s;white-space:nowrap}
    .btn-login:hover{background:var(--red);color:#fff}
    .btn-cadastro{padding:5px 10px;background:linear-gradient(135deg,var(--red),var(--orange));border-radius:8px;color:#fff;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    @media(max-width:600px){.back-link{display:none}.back-link-mobile{display:inline}}
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="index.html" class="back-link-mobile">←</a>
    <a href="index.html" class="logo-wrap">
      <img src="img/logo.png" onerror="this.style.display='none'"/>
      <span class="logo-text">PEPMASTERS</span>
    </a>
    <div class="header-right">
      <a href="index.html" class="back-link">← Início</a>
      <div id="authArea"></div>
      <button class="cart-btn" onclick="abrirCarrinho()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
        <span data-i18n="nav.cart">Cart</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>
<main>
  <h1>📦 Meus Pedidos</h1>
  <div id="listaPedidos"></div>
</main>
<footer>\u00a9 2025 PEPMASTERS — <a href="index.html">Voltar à loja</a></footer>
<script>
  const statusLabels = { pago:'Pago', pix_pending:'Aguardando PIX', enviado:'Enviado', entregue:'Entregue', cancelado:'Cancelado' };
  const statusClass  = { pago:'badge-pago', pix_pending:'badge-pendente', enviado:'badge-enviado', entregue:'badge-entregue', cancelado:'badge-cancelado' };

  async function init() {
    const token = localStorage.getItem('pep_token');
    if (!token) { location.href = 'login.html?redirect=meus-pedidos.html'; return; }

    const lista = document.getElementById('listaPedidos');

    try {
      const res  = await fetch('/api/meus-pedidos', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();

      if (!data.length) {
        lista.innerHTML = '<div class="empty"><h2>Nenhum pedido encontrado</h2><p>Você ainda não fez nenhum pedido.</p></div>';
        return;
      }

      data.forEach(p => {
        const sl = statusLabels[p.status] || p.status;
        const sc = statusClass[p.status] || 'badge-pendente';
        const data_fmt = new Date(p.criado_em).toLocaleDateString('pt-BR');
        lista.innerHTML += `
          <div class="pedido-card">
            <div class="pedido-header">
              <div>
                <div class="pedido-id">Pedido #${p.id}</div>
                <div class="pedido-data">${data_fmt}</div>
              </div>
              <span class="badge ${sc}">${sl}</span>
            </div>
            <div class="pedido-info">
              <div class="info-item"><label>Produto</label><span>${p.produto_nome || '—'}</span></div>
              <div class="info-item"><label>Total</label><span>R$ ${parseFloat(p.total || 0).toFixed(2).replace('.',',')}</span></div>
              <div class="info-item"><label>Pagamento</label><span>${p.pagamento === 'pix' ? 'PIX' : 'Cartão'}</span></div>
              ${p.codigo_rastreio ? '<div class="info-item"><label>Rastreio</label><span>' + p.codigo_rastreio + '</span></div>' : ''}
            </div>
            ${p.codigo_rastreio ? '<a href="rastrear-pedido.html?codigo=' + p.codigo_rastreio + '" class="rastrear-btn">📍 Rastrear</a>' : ''}
          </div>
        `;
      });
    } catch {
      lista.innerHTML = '<div class="empty"><h2>Erro ao carregar pedidos</h2><p>Tente novamente mais tarde.</p></div>';
    }
  }

  init();
</script>

<script src="i18n.js"></script>
<script src="i18n-init.js"></script>
<script>
function abrirCarrinho(){window.location.href='checkout.html';}
function logout(e){e.preventDefault();localStorage.removeItem('pep_token');localStorage.removeItem('pep_nome');window.location.href='index.html';}
function renderAuth(){
  var area=document.getElementById('authArea');
  if(!area)return;
  var token=localStorage.getItem('pep_token');
  var nome=localStorage.getItem('pep_nome');
  var d=window.PEPMASTERS_I18N||{};
  var l=localStorage.getItem('pep_lang')||'en';
  var tr=function(k){return(d[k]&&(d[k][l]||d[k]['en']))||k;};
  if(token&&nome){
    area.innerHTML='<span style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;color:var(--muted);white-space:nowrap">'+tr('nav.hello')+', '+nome.split(' ')[0]+'</span>'+
      '<a href="meus-pedidos.html" class="btn-login">'+tr('nav.orders')+'</a>'+
      '<a href="#" class="btn-login" onclick="logout(event)">'+tr('nav.logout')+'</a>';
  } else {
    area.innerHTML='<a href="login.html" class="btn-login">'+tr('nav.login')+'</a>'+
      '<a href="cadastro.html" class="btn-cadastro">'+tr('nav.register')+'</a>';
  }
}
function updateCartCount(){
  try{
    var c=JSON.parse(localStorage.getItem('pep_carrinho')||'[]');
    var n=c.reduce(function(s,i){return s+i.quantidade;},0);
    var el=document.getElementById('cartCount');
    if(el){el.style.display=n>0?'flex':'none';el.textContent=n;}
  }catch(e){}
}
window.addEventListener('DOMContentLoaded',function(){renderAuth();updateCartCount();});
</script>
</body>
</html>
