    .header-right{display:flex;align-items:center;gap:16px}
    .nav-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;color:rgba(255,255,255,.5);text-decoration:none;transition:color .2s}

    .hero{background:linear-gradient(135deg,#1C0A00,#3D1A00,#1C0A00);padding:52px 24px;text-align:center;border-bottom:1px solid rgba(255,179,0,.15);position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,179,0,.12),transparent 60%)}
    .hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(1.8rem,4vw,2.8rem);text-transform:uppercase;margin-bottom:10px;position:relative}
    .hero h1 span{background:linear-gradient(135deg,var(--amber),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .hero p{color:rgba(255,255,255,.5);font-size:.95rem;position:relative}
    /* MAIN */
    main{flex:1;max-width:1000px;margin:0 auto;padding:40px 24px;width:100%}
    /* CATEGORIAS */
    .cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
    .cat-tab{padding:8px 18px;border:1px solid rgba(255,255,255,.1);border-radius:20px;background:none;color:rgba(255,255,255,.5);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .cat-tab:hover,.cat-tab.active{border-color:var(--amber);color:var(--amber);background:rgba(255,179,0,.06)}

    .card-icon{font-size:2.2rem;flex-shrink:0}
    .card-tipo{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--amber);margin-bottom:4px}
    .card-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.05rem;color:#fff;line-height:1.2}
    .card-body{padding:16px 20px}

    .card-meta{display:flex;gap:12px;align-items:center}

    .modal-box{background:#1a0c00;border:1px solid rgba(255,179,0,.2);border-radius:18px;padding:32px;max-width:680px;width:100%;margin:auto}
    .modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
    .modal-titulo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;color:#fff}

    .btn-fechar:hover{color:#fff}

    #toast.show{transform:translateY(0);opacity:1}

function nivelIndex(n){ return nivelOrder.indexOf(n); }

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

function sair(e){
  e.preventDefault();
  localStorage.removeItem('pep_token');
  localStorage.removeItem('pep_nome');
  location.href='index.html';
}

function filtrar(cat, btn){
  catAtual = cat;
  document.querySelectorAll('.cat-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  var grid = document.getElementById('contentGrid');
  var lista = conteudos.filter(function(c){
    return catAtual === 'todos' || c.tipo === catAtual;
  });

  grid.innerHTML = lista.map(function(c){
    var temAcesso = true;
    var nivelLabel = {bronze:'Bronze',prata:'Prata',ouro:'Ouro',diamante:'Diamante'}[c.nivel];
    return '<div class="content-card" onclick="abrirConteudo('+c.id+')">' +
      '<div class="card-header">' +
        '<div class="card-icon">' + (temAcesso ? c.icon : '🔒') + '</div>' +
        '<div>' +
          '<div class="card-tipo">' + c.tipo + '</div>' +
          '<div class="card-titulo">' + c.titulo + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-desc">' + c.desc + '</div>' +
        '<div class="card-meta">' +
          '<span class="nivel-required nivel-'+c.nivel+'">'+
            ({bronze:'🥉',prata:'🥈',ouro:'🥇',diamante:'💎'}[c.nivel])+' '+nivelLabel+'+' +
          '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

    body = '<div class="locked-overlay">' +
      '<div class="lock-icon">🔒</div>' +
      '<p>Este conteúdo é exclusivo para membros <strong style="color:var(--amber)">' + nivelLabel + '+</strong>.<br/><br/>Aumente suas vendas para evoluir de nível e desbloquear!</p>' +
    '</div>';
  } else {
    body = '<p style="color:rgba(255,255,255,.6);margin-bottom:20px">' + c.corpo.intro + '</p>';
    c.corpo.secoes.forEach(function(s){
      body += '<h3>' + s.titulo + '</h3><ul>';
      s.items.forEach(function(i){ body += '<li>' + i + '</li>'; });
      body += '</ul>';
    });
    if (c.corpo.estudos && c.corpo.estudos.length) {
      body += '<h3>📚 Estudos e Referências</h3><ul>';
      c.corpo.estudos.forEach(function(e){
        body += '<li><a href="' + e.url + '" target="_blank" rel="noopener" style="color:var(--amber);text-decoration:none;border-bottom:1px solid rgba(255,179,0,.3)">' + e.texto + ' ↗</a></li>';
      });
      body += '</ul>';
    }
    body += '<div class="aviso">' + c.corpo.aviso + '</div>';
  }
  document.getElementById('modalBody').innerHTML = '<div class="modal-content">' + body + '</div>';
  document.getElementById('modal').classList.add('open');
}

function fecharModal(){
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e){
  if(e.target === this) fecharModal();
});

async function init(){
  if(!token){ location.href='login.html?redirect=members-conteudo.html'; return; }
  try {
    var res = await fetch('/api/membros/painel', {headers:{Authorization:'Bearer '+token}});
    if(!res.ok){ location.href='members.html?msg=assine'; return; }
    var data = await res.json();
    nivelAtual = data.nivel || 'bronze';
    renderGrid();
  } catch {
    nivelAtual = 'bronze';
    renderGrid();
  }
}

init();
</script>
</body>
</html>
