<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin Usuários — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--dark);min-height:100vh;color:#fff}
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:#110500;border-right:2px solid rgba(255,179,0,.15);padding:24px 0;display:flex;flex-direction:column}
    .sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 20px 24px;border-bottom:1px solid rgba(255,179,0,.1)}
    .sidebar-logo img{height:32px;width:32px;object-fit:contain}
    .sidebar-logo span{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sidebar-badge{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,179,0,.5);padding:0 20px;margin-top:8px;margin-bottom:4px}
    .sidebar a{display:block;padding:11px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:all .2s;border-left:3px solid transparent}
    .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,179,0,.08);border-left-color:var(--amber)}
    .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,179,0,.1)}
    .sidebar-footer a{font-size:.82rem;color:rgba(255,255,255,.3);text-decoration:none}
    .sidebar-footer a:hover{color:var(--amber)}
    .main{margin-left:220px;padding:32px}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;text-transform:uppercase;margin-bottom:24px}
    .toolbar{display:flex;gap:10px;margin-bottom:16px;align-items:center}
    .toolbar input{padding:9px 13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,179,0,.2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:.88rem;color:#fff;outline:none;width:280px}
    .toolbar input::placeholder{color:rgba(255,255,255,.35)}
    .stat{background:rgba(255,255,255,.05);border-radius:12px;padding:16px 20px;border:1px solid rgba(255,179,0,.1);margin-left:auto}
    .stat-label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
    .stat-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.6rem;color:var(--amber)}
    .table-wrap{background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,179,0,.1);overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.85rem}
    th{padding:12px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,179,0,.7);border-bottom:1px solid rgba(255,179,0,.1)}
    td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
    tr:last-child td{border:none}
    tr:hover td{background:rgba(255,179,0,.03)}
    .btn-del{padding:5px 14px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#f87171;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .2s}
    .btn-del:hover{background:rgba(239,68,68,.3);border-color:#f87171}
    .btn-reset{padding:5px 14px;background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.25);color:var(--amber);border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;transition:all .2s;margin-right:6px}
    .btn-reset:hover{background:rgba(255,179,0,.2)}
    /* Modal confirm */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:#1a0800;border-radius:16px;padding:32px;max-width:380px;width:90%;border-top:4px solid var(--red);box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .modal-box h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.3rem;color:#fff;margin-bottom:8px}
    .modal-box p{font-size:.88rem;color:rgba(255,255,255,.55);margin-bottom:22px;line-height:1.6}
    .modal-box strong{color:#f87171}
    .modal-actions{display:flex;gap:10px}
    .btn-cancel-modal{flex:1;padding:10px;background:none;border:1px solid rgba(255,255,255,.15);border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;color:rgba(255,255,255,.5);transition:all .2s}
    .btn-cancel-modal:hover{border-color:rgba(255,255,255,.4);color:#fff}
    .btn-confirm-del{flex:2;padding:10px;background:linear-gradient(135deg,#b91c1c,#ef4444);border:none;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;color:#fff;letter-spacing:.06em}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;border-left:4px solid var(--amber);box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(10px);opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    .empty{text-align:center;padding:40px;color:rgba(255,255,255,.3);font-size:.9rem}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><img src="Capturar.PNG" alt="Logo"/><span>PEPMASTERS</span></div>
  <div class="sidebar-badge">Admin</div>
  <a href="admin.html">📋 Pedidos</a>
  <a href="admin-cupons.html">🏷️ Cupons</a>
  <a href="admin-membros.html">👥 Membros</a>
  <a href="admin-estoque.html">📦 Estoque</a>
  <a href="admin-usuarios.html" class="active">👥 Usuários</a>
  <div class="sidebar-footer"><a href="index.html">← Ver loja</a></div>
</div>

<div class="main">
  <h1>👥 Usuários</h1>

  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar por nome ou email..." oninput="filtrar()" />
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="totalUsuarios">—</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>Nome</th><th>Email</th><th>CPF</th><th>Telefone</th><th>Cadastro</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<!-- Modal confirmação -->
<div class="modal-overlay" id="modalDel">
  <div class="modal-box">
    <h3>⚠️ Deletar usuário</h3>
    <p>Tem certeza que deseja deletar o usuário <strong id="modalNome">—</strong>? Esta ação não pode ser desfeita.</p>
    <div class="modal-actions">
      <button class="btn-cancel-modal" onclick="fecharModal()">Cancelar</button>
      <button class="btn-confirm-del" onclick="confirmarDelete()">Deletar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const token = localStorage.getItem('pep_admin_token');
  if (!token) location.href = 'admin-login.html';

  let todos = [];
  let deletarId = null;

  async function carregar() {
    try {
      const res  = await fetch('/api/admin/usuarios', { headers: { Authorization: 'Basic ' + token } });
      if (res.status === 401) { location.href = 'admin-login.html'; return; }
      todos = await res.json();
      document.getElementById('totalUsuarios').textContent = todos.length;
      renderTabela(todos);
    } catch { showToast('Erro ao carregar usuários.'); }
  }

  function renderTabela(lista) {
    const tb = document.getElementById('tBody');
    if (!lista.length) { tb.innerHTML = '<tr><td colspan="7"><div class="empty">Nenhum usuário encontrado.</div></td></tr>'; return; }
    tb.innerHTML = '';
    lista.forEach(u => {
      const dt = new Date(u.criado_em).toLocaleDateString('pt-BR');
      tb.innerHTML +=
        '<tr>' +
          '<td>#' + u.id + '</td>' +
          '<td>' + (u.nome || '—') + '</td>' +
          '<td>' + (u.email || '—') + '</td>' +
          '<td>' + (u.cpf || '—') + '</td>' +
          '<td>' + (u.telefone || '—') + '</td>' +
          '<td>' + dt + '</td>' +
          '<td>' +
            '<button class="btn-reset" onclick="resetarSenha(' + u.id + ', \'' + (u.email||'') + '\')">Resetar senha</button>' +
            '<button class="btn-del" onclick="abrirModal(' + u.id + ', \'' + (u.nome||'usuário') + '\')">Deletar</button>' +
          '</td>' +
        '</tr>';
    });
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    renderTabela(todos.filter(u =>
      (u.nome||'').toLowerCase().includes(q) || (u.email||'').toLowerCase().includes(q)
    ));
  }

  function abrirModal(id, nome) {
    deletarId = id;
    document.getElementById('modalNome').textContent = nome;
    document.getElementById('modalDel').classList.add('open');
  }

  function fecharModal() {
    deletarId = null;
    document.getElementById('modalDel').classList.remove('open');
  }

  async function confirmarDelete() {
    if (!deletarId) return;
    fecharModal();
    try {
      const res = await fetch('/api/admin/usuarios/' + deletarId, {
        method: 'DELETE',
        headers: { Authorization: 'Basic ' + token }
      });
      if (res.ok) { showToast('✅ Usuário deletado!'); carregar(); }
      else { const d = await res.json(); showToast('Erro: ' + (d.erro || 'Falha ao deletar.')); }
    } catch { showToast('Erro de conexão.'); }
  }

  async function resetarSenha(id, email) {
    try {
      const res  = await fetch('/api/admin/usuarios/' + id + '/reset-senha', {
        method: 'POST',
        headers: { Authorization: 'Basic ' + token }
      });
      const data = await res.json();
      if (res.ok) showToast('✅ Email de redefinição enviado para ' + email);
      else showToast('Erro: ' + (data.erro || 'Falha.'));
    } catch { showToast('Erro de conexão.'); }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  carregar();
</script>
