<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admin — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--amber:#FFB300;--red:#E8220A;--orange:#FF6B00;--cream:#FFF8F0;--warm-white:#FFFDF9;--dark:#1C0A00;--mid:#3D1A00;--muted:#7A4A2A;--border:#FFD580}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--dark);min-height:100vh;color:#fff}
    /* Sidebar */
    .sidebar{position:fixed;top:0;left:0;bottom:0;width:220px;background:#110500;border-right:2px solid rgba(255,179,0,.15);padding:24px 0;display:flex;flex-direction:column}
    .sidebar-logo{display:flex;align-items:center;gap:8px;padding:0 20px 24px;border-bottom:1px solid rgba(255,179,0,.1)}
    .sidebar-logo img{height:32px;width:32px;object-fit:contain}
    .sidebar-logo span{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.2rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sidebar-badge{font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,179,0,.5);padding:0 20px;margin-top:8px;margin-bottom:4px}
    .sidebar a{display:block;padding:11px 20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:all .2s;border-left:3px solid transparent}
    .sidebar a:hover,.sidebar a.active{color:#fff;background:rgba(255,179,0,.08);border-left-color:var(--amber)}
    .sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,179,0,.1)}
    .sidebar-footer a{font-size:.82rem;color:rgba(255,255,255,.3);text-decoration:none}
    .sidebar-footer a:hover{color:var(--amber)}
    /* Main */
    .main{margin-left:220px;padding:32px}
    h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.8rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:24px}
    /* Stats */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
    .stat-card{background:rgba(255,255,255,.05);border-radius:14px;padding:20px;border:1px solid rgba(255,179,0,.1)}
    .stat-label{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:6px}
    .stat-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;color:#fff}
    .stat-value.red{color:var(--red)}
    .stat-value.amber{color:var(--amber)}
    /* Toolbar */
    .toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
    .toolbar input,.toolbar select{padding:9px 13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,179,0,.2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:.88rem;color:#fff;outline:none}
    .toolbar input::placeholder{color:rgba(255,255,255,.35)}
    .toolbar select option{background:#1C0A00;color:#fff}
    .btn-export{padding:9px 18px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;margin-left:auto}
    /* Table */
    .table-wrap{background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,179,0,.1);overflow:auto}
    table{width:100%;border-collapse:collapse;font-size:.84rem}
    th{padding:12px 14px;text-align:left;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,179,0,.7);border-bottom:1px solid rgba(255,179,0,.1);white-space:nowrap}
    td{padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.8);vertical-align:middle}
    tr:last-child td{border:none}
    tr:hover td{background:rgba(255,179,0,.04)}
    .badge{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
    .b-pago{background:#14532d;color:#4ade80}
    .b-pending{background:#713f12;color:#fbbf24}
    .b-enviado{background:#1e3a5f;color:#60a5fa}
    .b-entregue{background:#3b0764;color:#c084fc}
    .b-cancelado{background:#450a0a;color:#f87171}
    .input-rastreio{background:rgba(255,255,255,.06);border:1px solid rgba(255,179,0,.2);border-radius:6px;padding:5px 8px;color:#fff;font-size:.8rem;width:130px;font-family:'Barlow',sans-serif}
    .btn-save{padding:5px 12px;background:var(--orange);color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.04em;text-transform:uppercase}
    select.status-sel{background:rgba(255,255,255,.06);border:1px solid rgba(255,179,0,.2);border-radius:6px;padding:5px 8px;color:#fff;font-size:.8rem;font-family:'Barlow',sans-serif}
    select.status-sel option{background:#1C0A00}
    .checkbox-col{width:32px;text-align:center}
    input[type=checkbox]{width:16px;height:16px;accent-color:var(--amber);cursor:pointer}
    .acoes-bar{display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(255,179,0,.06);border:1px solid rgba(255,179,0,.2);border-radius:10px;margin-bottom:12px}
    .acoes-bar.visivel{display:flex}
    .btn-exportar{padding:8px 16px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .btn-deletar{padding:8px 16px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;cursor:pointer;transition:all .2s}
    .btn-exportar:hover{background:rgba(34,197,94,.25)}.btn-deletar:hover{background:rgba(239,68,68,.25)}
    #toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:.88rem;border-left:4px solid var(--amber);box-shadow:0 8px 30px rgba(0,0,0,.5);transform:translateY(10px);opacity:0;transition:all .3s;z-index:999;pointer-events:none}
    #toast.show{transform:translateY(0);opacity:1}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <img src="Capturar.PNG" alt="Logo"/>
    <span>PEPMASTERS</span>
  </div>
  <div class="sidebar-badge">Admin</div>
  <a href="admin-dashboard.html" class="nav-link">📊 Dashboard</a>
    <a href="admin.html" class="active">📋 Pedidos</a>
  <a href="admin-cupons.html">🏷️ Cupons</a>
  <a href="admin-membros.html">👥 Membros</a>
  <a href="admin-estoque.html">📦 Estoque</a>
  <a href="admin-usuarios.html">👥 Usuários</a>
  <div class="sidebar-footer">
    <a href="index.html">← Ver loja</a>
  </div>
</div>

<div class="main">
  <h1>📋 Pedidos</h1>

  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">Total Pedidos</div><div class="stat-value" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Pagos</div><div class="stat-value amber" id="s-pagos">—</div></div>
    <div class="stat-card"><div class="stat-label">Pendentes PIX</div><div class="stat-value red" id="s-pend">—</div></div>
    <div class="stat-card"><div class="stat-label">Receita Total</div><div class="stat-value amber" id="s-receita">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="busca" placeholder="Buscar cliente, email, ID..." oninput="filtrar()" />
    <select id="filtroStatus" onchange="filtrar()">
      <option value="">Todos os status</option>
      <option value="pago">Pago</option>
      <option value="pix_pending">Aguardando PIX</option>
      <option value="enviado">Enviado</option>
      <option value="entregue">Entregue</option>
      <option value="cancelado">Cancelado</option>
    </select>
    <button class="btn-export" onclick="exportarCSV()">⬇ Exportar CSV</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr class="${p.pagamento === 'cripto' && p.status === 'pix_pending' ? 'cripto-pending' : ''}">
          <th class="checkbox-col"><input type="checkbox" id="checkAll" onchange="toggleAll(this)"></th>
          <th>ID</th><th>Cliente</th><th>Email</th><th>Produto</th><th>Total</th>
          <th>Cupom</th><th>Pagamento</th><th>Status</th><th>Rastreio</th><th>Data</th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
  const token = localStorage.getItem('pep_admin_token');
  if (!token) location.href = 'admin-login.html';

  let todos = [];

  const badgeClass = { pago:'b-pago', pix_pending:'b-pending', enviado:'b-enviado', entregue:'b-entregue', cancelado:'b-cancelado' };
  const statusLabel = { pago:'Pago', pix_pending:'Aguard. PIX', enviado:'Enviado', entregue:'Entregue', cancelado:'Cancelado' };

  async function carregar() {
    try {
      const res  = await fetch('/api/admin/pedidos', { headers: { Authorization: 'Basic ' + token } });
      if (res.status === 401) { location.href = 'admin-login.html'; return; }
      todos = await res.json();
      atualizarStats();
      renderTabela(todos);
    } catch { showToast('Erro ao carregar pedidos.'); }
  }

  function atualizarStats() {
    document.getElementById('s-total').textContent   = todos.length;
    document.getElementById('s-pagos').textContent   = todos.filter(p => p.status === 'pago' || p.status === 'enviado' || p.status === 'entregue').length;
    document.getElementById('s-pend').textContent    = todos.filter(p => p.status === 'pix_pending').length;
    const receita = todos.filter(p => p.status !== 'cancelado' && p.status !== 'pix_pending').reduce((s, p) => s + parseFloat(p.total || 0), 0);
    document.getElementById('s-receita').textContent = 'R$ ' + receita.toFixed(2).replace('.',',');
  }

  function renderTabela(list) {
    const tbody = document.getElementById('tBody');
    tbody.innerHTML = '';
    list.forEach(p => {
      const bc = badgeClass[p.status] || 'b-pending';
      const sl = statusLabel[p.status] || p.status;
      const dt = new Date(p.criado_em).toLocaleDateString('pt-BR');
      tbody.innerHTML += `
        <tr data-id="${p.id}">
          <td class="checkbox-col"><input type="checkbox" class="chk-pedido" value="${p.id}" onchange="atualizarAcoes()"></td>
          <td>#${p.id}</td>
          <td>${p.nome || '—'}</td>
          <td>${p.email || '—'}</td>
          <td>${p.produto_nome || '—'}</td>
          <td>R$ ${parseFloat(p.total || 0).toFixed(2).replace('.',',')}</td>
          <td>${p.cupom || '—'}</td>
          <td>
            ${p.pagamento === 'pix' ? 'PIX' : p.pagamento === 'cripto' ? '🔶 Cripto' : p.pagamento === 'paypal' ? 'PayPal' : 'WhatsApp'}
            ${p.pagamento === 'cripto' && p.crypto_valor ? `<br><small style="color:#92400e;font-weight:700">${p.crypto_valor} ${p.crypto_token || 'USDT'}</small>` : ''}
          </td>
          <td>
            <select class="status-sel" onchange="salvarStatus(${p.id}, this.value)">
              ${['pago','pix_pending','enviado','entregue','cancelado'].map(s =>
                '<option value="' + s + '"' + (p.status === s ? ' selected' : '') + '>' + (statusLabel[s] || s) + '</option>'
              ).join('')}
            </select>
            ${p.pagamento === 'cripto' && p.status === 'pix_pending' ? `
            <div style="margin-top:6px;padding:6px 8px;background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;font-size:.72rem">
              <div>Esperado: <strong>${p.crypto_valor || '?'} ${p.crypto_token || 'USDT'}</strong></div>
              <a href="https://polygonscan.com/address/${p.crypto_token === 'USDC' ? '0x3c499c542cef5e3811e1192ce70d8cc03d5c3359' : '0xc2132d05d31c914a87c6611c10748aeb04b58e8f'}?a=0xDA95bb300C7be3E3347d449b14b834Dc3098deAD" target="_blank" style="color:#b45309;font-size:.7rem">Ver no Polygonscan ↗</a>
              <br><button onclick="confirmarCripto(${p.id})" style="margin-top:4px;padding:3px 8px;background:#15803d;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:.72rem;font-weight:700">✓ Confirmar pagamento</button>
            </div>` : ''}
          </td>
          <td>
            <input class="input-rastreio" id="r-${p.id}" value="${p.codigo_rastreio || ''}" placeholder="Código" />
            <button class="btn-save" onclick="salvarRastreio(${p.id})">Salvar</button>
          </td>
          <td>${dt}</td>
        </tr>
      `;
    });
  }

  async function confirmarCripto(id) {
    if (!confirm('Confirmar pagamento cripto do pedido #' + id + '?')) return;
    const res = await fetch('/api/admin/pedido/' + id + '/status', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'pago' })
    });
    if ((await res.json()).ok) { alert('Pedido #' + id + ' confirmado!'); carregarPedidos(); }
    else alert('Erro ao confirmar.');
  }

  function filtrar() {
    const q = document.getElementById('busca').value.toLowerCase();
    const s = document.getElementById('filtroStatus').value;
    const f = todos.filter(p =>
      (!q || (p.nome + p.email + p.id).toLowerCase().includes(q)) &&
      (!s || p.status === s)
    );
    renderTabela(f);
  }

  async function salvarStatus(id, status) {
    try {
      await fetch('/api/admin/pedido/' + id + '/status', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
        body: JSON.stringify({ status })
      });
      showToast('Status atualizado!');
      const p = todos.find(x => x.id === id);
      if (p) p.status = status;
      atualizarStats();
    } catch { showToast('Erro ao atualizar.'); }
  }

  async function salvarRastreio(id) {
    const codigo = document.getElementById('r-' + id).value.trim();
    try {
      await fetch('/api/admin/pedido/' + id + '/rastreio', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
        body: JSON.stringify({ codigo_rastreio: codigo })
      });
      showToast('Rastreio salvo!');
    } catch { showToast('Erro ao salvar.'); }
  }

  function exportarCSV() {
    const headers = ['ID','Cliente','Email','Produto','Total','Cupom','Pagamento','Status','Rastreio','Data'];
    const rows = todos.map(p => [
      p.id, p.nome || '', p.email || '', p.produto_nome || '',
      parseFloat(p.total || 0).toFixed(2), p.cupom || '',
      p.pagamento, p.status, p.codigo_rastreio || '',
      new Date(p.criado_em).toLocaleDateString('pt-BR')
    ]);
    const csv = [headers, ...rows].map(r => r.join(';')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }));
    a.download = 'pedidos-pepmasters.csv';
    a.click();
  }

  var selectedIds = [];

function toggleAll(el) {
  document.querySelectorAll('.chk-pedido').forEach(function(c){ c.checked = el.checked; });
  atualizarAcoes();
}

function atualizarAcoes() {
  var checked = document.querySelectorAll('.chk-pedido:checked');
  selectedIds = Array.from(checked).map(function(c){ return parseInt(c.value); });
  var bar = document.getElementById('acoesBar');
  var count = document.getElementById('acoesCount');
  bar.classList.toggle('visivel', selectedIds.length > 0);
  count.textContent = selectedIds.length + ' selecionado' + (selectedIds.length !== 1 ? 's' : '');
}

function desmarcarTodos() {
  document.querySelectorAll('.chk-pedido').forEach(function(c){ c.checked = false; });
  document.getElementById('checkAll').checked = false;
  selectedIds = [];
  document.getElementById('acoesBar').classList.remove('visivel');
}

function exportarCSV() {
  if (!selectedIds.length) return;
  var rows = [['ID','Email','Produto','Total','Pagamento','Status','Data']];
  document.querySelectorAll('#tabelaPedidos tr[data-id]').forEach(function(tr) {
    var id = parseInt(tr.getAttribute('data-id'));
    if (!selectedIds.includes(id)) return;
    var cells = tr.querySelectorAll('td');
    // cells[0]=checkbox, [1]=id, [2]=email, [3]=produto, [4]=total, [5]=pagamento, [6]=status, [7]=data
    rows.push([cells[1].textContent, cells[2].textContent, cells[3].textContent, cells[4].textContent, cells[5].textContent, cells[6].textContent, cells[7].textContent]);
  });
  var csv = rows.map(function(r){ return r.map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a'); a.href=url; a.download='pedidos_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

async function confirmarDelete() {
  if (!selectedIds.length) return;
  if (!confirm('Deletar ' + selectedIds.length + ' pedido(s)? Esta ação não pode ser desfeita.')) return;
  try {
    var res = await fetch('/api/admin/pedidos', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json', Authorization: 'Basic ' + token },
      body: JSON.stringify({ ids: selectedIds })
    });
    var data = await res.json();
    if (!res.ok) { showToast(data.erro || 'Erro ao deletar.'); return; }
    showToast(data.deletados + ' pedido(s) deletado(s)!');
    desmarcarTodos();
    carregarPedidos();
  } catch { showToast('Erro de conexão.'); }
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  carregar();
</script>
