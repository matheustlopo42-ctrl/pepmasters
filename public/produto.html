<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PEPMASTERS — Product</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#E8220A;--orange:#F97316;--amber:#FFB300;--dark:#1C0A00;--mid:#5C3D1E;--muted:#9C7B5A;--cream:#FFFDF9;--warm-white:#FFF8F0;--border:#FFE0A0;--bg:#FAF5EE}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--dark)}
    header{background:#fff;border-bottom:2px solid var(--amber);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo-wrap{display:flex;align-items:center;gap:8px;text-decoration:none}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;color:var(--red);letter-spacing:.06em}
    .back-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:4px}
    main{max-width:1000px;margin:0 auto;padding:32px 20px}
    .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:48px}
    .product-img{background:linear-gradient(135deg,#FFF3D0,#FFE0A0);border-radius:16px;padding:32px;display:flex;align-items:center;justify-content:center;min-height:320px}
    .product-img img{max-width:100%;max-height:280px;object-fit:contain}
    .product-info{display:flex;flex-direction:column;gap:16px}
    .cat-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;background:var(--cream);border:1px solid var(--border);color:var(--orange)}
    .product-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2.4rem;letter-spacing:.02em;line-height:1}
    .product-price{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;color:var(--red)}
    .product-price span{font-size:1rem;font-weight:600;color:var(--muted)}
    .product-desc{font-size:.95rem;color:var(--mid);line-height:1.7}
    .qty-row{display:flex;align-items:center;gap:12px}
    .qty-btn{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);background:none;cursor:pointer;font-size:1.2rem;font-weight:700;color:var(--mid);display:flex;align-items:center;justify-content:center;transition:all .2s}
    .qty-btn:hover{border-color:var(--orange);color:var(--orange)}
    .qty-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;min-width:32px;text-align:center}
    .btn-add{padding:14px 32px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:30px;cursor:pointer;box-shadow:0 4px 16px rgba(232,34,10,.3);transition:transform .15s}
    .btn-add:hover{transform:translateY(-2px)}
    .esgotado{padding:14px 32px;background:#e5e7eb;color:#9ca3af;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:30px;cursor:not-allowed}
    .section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--border)}
    .info-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
    .tab-btn{padding:8px 18px;border:2px solid var(--border);border-radius:20px;background:none;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.04em;color:var(--muted);transition:all .2s}
    .tab-btn.active{border-color:var(--orange);color:var(--orange);background:#FFF3E0}
    .tab-content{display:none;font-size:.9rem;color:var(--mid);line-height:1.8}
    .tab-content.active{display:block}
    .tab-content p{margin-bottom:12px}
    .tab-content ul{padding-left:18px}
    .tab-content li{margin-bottom:6px}
    /* AVALIAÇÕES */
    .reviews-section{margin-top:48px}
    .stars{color:var(--amber);font-size:1.1rem;letter-spacing:2px}
    .rating-summary{display:flex;align-items:center;gap:16px;margin-bottom:24px}
    .rating-big{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3rem;color:var(--dark)}
    .review-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
    .review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .review-author{font-weight:700;font-size:.9rem}
    .review-date{font-size:.78rem;color:var(--muted)}
    .review-text{font-size:.88rem;color:var(--mid);line-height:1.6}
    .review-form{background:var(--cream);border:1px solid var(--border);border-radius:12px;padding:20px;margin-top:24px}
    .review-form h4{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.1rem;margin-bottom:16px}
    .star-select{display:flex;gap:6px;margin-bottom:14px;font-size:1.6rem;cursor:pointer}
    .star-select span{color:#d1d5db;transition:color .15s}
    .star-select span.on{color:var(--amber)}
    .form-input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-family:'Inter',sans-serif;font-size:.88rem;background:#fff;margin-bottom:10px;outline:none}
    .form-input:focus{border-color:var(--orange)}
    textarea.form-input{min-height:80px;resize:vertical}
    .btn-review{padding:10px 24px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:20px;cursor:pointer}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 24px;border-radius:30px;font-size:.88rem;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}
    @media(max-width:768px){
      .product-grid{grid-template-columns:1fr}
      .product-name{font-size:1.8rem}
    }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="logo-wrap">
    <img src="Capturar.PNG" alt="Logo" style="height:36px;width:36px;object-fit:contain"/>
    <span class="logo-text">PEPMASTERS</span>
  </a>
  <a href="index.html" class="back-link">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    <span data-i18n="nav.home">Início</span>
  </a>
</header>

<main>
  <div id="productContainer">
    <div style="text-align:center;padding:60px;color:var(--muted)">Carregando...</div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="i18n.js"></script>
<script src="i18n-init.js"></script>
<script>
const CATALOGO = [
  {id:'16',nome:'VIP',img:'img/vip.png',catClass:'antiinfla',preco:200,i18n:{pt:{categoria:'Anti-inflamatório',descricao:'Peptídeo vasoativo intestinal. Potente anti-inflamatório sistêmico.',detalhes:'O VIP (Vasoactive Intestinal Peptide) é um neuropeptídeo com potente ação anti-inflamatória sistêmica. Age modulando o sistema imunológico e reduzindo citocinas inflamatórias.',protocolo:'Dosagem usual: 25-50mcg por administração. Frequência: 1-2x ao dia. Ciclo recomendado: 4-8 semanas.',beneficios:['Redução de inflamação sistêmica','Modulação imunológica','Neuroproteção','Melhora da função pulmonar']},en:{categoria:'Anti-inflammatory',descricao:'Vasoactive intestinal peptide. Potent systemic anti-inflammatory.',detalhes:'VIP (Vasoactive Intestinal Peptide) is a neuropeptide with potent systemic anti-inflammatory action. It modulates the immune system and reduces inflammatory cytokines.',protocolo:'Usual dosage: 25-50mcg per administration. Frequency: 1-2x per day. Recommended cycle: 4-8 weeks.',beneficios:['Reduction of systemic inflammation','Immune modulation','Neuroprotection','Improved lung function']},es:{categoria:'Antiinflamatorio',descricao:'Péptido vasoactivo intestinal. Potente antiinflamatorio sistémico.',detalhes:'El VIP es un neuropéptido con potente acción antiinflamatoria sistémica.',protocolo:'Dosis habitual: 25-50mcg por administración. Frecuencia: 1-2x al día.',beneficios:['Reducción de inflamación','Modulación inmune','Neuroprotección']},de:{categoria:'Entzündungshemmend',descricao:'Vasoaktives intestinales Peptid. Starkes systemisches Entzündungshemmemittel.',detalhes:'VIP ist ein Neuropeptid mit starker systemischer entzündungshemmender Wirkung.',protocolo:'Übliche Dosierung: 25-50mcg pro Verabreichung. Häufigkeit: 1-2x täglich.',beneficios:['Reduzierung von Entzündungen','Immunmodulation','Neuroprotektion']},fr:{categoria:'Anti-inflammatoire',descricao:'Peptide vasoactif intestinal. Puissant anti-inflammatoire systémique.',detalhes:'Le VIP est un neuropeptide à puissante action anti-inflammatoire systémique.',protocolo:'Dosage habituel: 25-50mcg par administration. Fréquence: 1-2x par jour.',beneficios:["Réduction de l'inflammation",'Modulation immunitaire','Neuroprotection']}}},
  {id:'1',nome:'BPC-157',img:'img/bpc-157.png',catClass:'recuperacao',preco:150,i18n:{pt:{categoria:'Recuperação',descricao:'Recuperação muscular e articular acelerada. Excelente para lesões.',detalhes:'O BPC-157 é um pentadecapeptídeo derivado de uma proteína de proteção gástrica. Tem efeitos regenerativos comprovados em músculos, tendões, ligamentos e articulações.',protocolo:'Dosagem usual: 200-500mcg por dia. Via: subcutânea ou intramuscular próximo à área lesionada. Ciclo: 4-12 semanas.',beneficios:['Aceleração da recuperação muscular','Regeneração de tendões e ligamentos','Redução de inflamação','Proteção gástrica']},en:{categoria:'Recovery',descricao:'Accelerated muscle and joint recovery. Excellent for injuries.',detalhes:'BPC-157 is a pentadecapeptide derived from a gastric protection protein. It has proven regenerative effects on muscles, tendons, ligaments and joints.',protocolo:'Usual dosage: 200-500mcg per day. Route: subcutaneous or intramuscular near the injured area. Cycle: 4-12 weeks.',beneficios:['Accelerated muscle recovery','Tendon and ligament regeneration','Inflammation reduction','Gastric protection']},es:{categoria:'Recuperación',descricao:'Recuperación muscular y articular acelerada. Excelente para lesiones.',detalhes:'BPC-157 es un pentadecapéptido con efectos regenerativos probados en músculos, tendones y articulaciones.',protocolo:'Dosis habitual: 200-500mcg/día. Vía subcutánea o intramuscular. Ciclo: 4-12 semanas.',beneficios:['Recuperación muscular acelerada','Regeneración de tendones','Reducción de inflamación']},de:{categoria:'Erholung',descricao:'Beschleunigte Muskel- und Gelenkerholung. Ausgezeichnet bei Verletzungen.',detalhes:'BPC-157 ist ein Pentadecapeptid mit regenerativen Wirkungen auf Muskeln, Sehnen und Gelenke.',protocolo:'Übliche Dosierung: 200-500mcg/Tag. Subkutan oder intramuskulär. Zyklus: 4-12 Wochen.',beneficios:['Beschleunigte Muskelerholung','Sehnenregeneration','Entzündungshemmung']},fr:{categoria:'Récupération',descricao:'Récupération musculaire et articulaire accélérée. Excellent pour les blessures.',detalhes:'BPC-157 est un pentadecapeptide avec des effets régénérateurs sur les muscles, tendons et articulations.',protocolo:'Dosage habituel: 200-500mcg/jour. Voie sous-cutanée ou intramusculaire. Cycle: 4-12 semaines.',beneficios:['Récupération musculaire accélérée','Régénération des tendons','Réduction de inflammation']}}},
  {id:'2',nome:'TB-500',img:'img/tb-500.png',catClass:'recuperacao',preco:180,i18n:{pt:{categoria:'Recuperação',descricao:'Regeneração tecidual profunda e efeito anti-inflamatório potente.',detalhes:'TB-500 é uma forma sintética do Thymosin Beta-4, proteína presente em quase todas as células do corpo. Promove regeneração tecidual profunda e tem potente ação anti-inflamatória.',protocolo:'Dosagem usual: 2-2.5mg 2x por semana nas primeiras 4-6 semanas (fase de carga), depois 2-2.5mg 1x por semana.',beneficios:['Regeneração tecidual profunda','Redução de inflamação','Melhora da mobilidade','Cicatrização acelerada']},en:{categoria:'Recovery',descricao:'Deep tissue regeneration and potent anti-inflammatory effect.',detalhes:'TB-500 is a synthetic form of Thymosin Beta-4, a protein present in almost all cells of the body. It promotes deep tissue regeneration and has potent anti-inflammatory action.',protocolo:'Usual dosage: 2-2.5mg 2x per week for the first 4-6 weeks (loading phase), then 2-2.5mg 1x per week.',beneficios:['Deep tissue regeneration','Inflammation reduction','Improved mobility','Accelerated healing']},es:{categoria:'Recuperación',descricao:'Regeneración tisular profunda y efecto antiinflamatorio potente.',detalhes:'TB-500 es una forma sintética del Thymosin Beta-4. Promueve regeneración tisular profunda.',protocolo:'Dosis: 2-2.5mg 2x/semana las primeras 4-6 semanas, luego 1x/semana.',beneficios:['Regeneración tisular','Antiinflamatorio','Movilidad mejorada']},de:{categoria:'Erholung',descricao:'Tiefe Geweberegeneration und starke entzündungshemmende Wirkung.',detalhes:'TB-500 ist eine synthetische Form von Thymosin Beta-4. Es fördert tiefe Geweberegeneration.',protocolo:'Dosierung: 2-2.5mg 2x/Woche in den ersten 4-6 Wochen, dann 1x/Woche.',beneficios:['Tiefe Geweberegeneration','Entzündungshemmung','Verbesserte Mobilität']},fr:{categoria:'Récupération',descricao:'Régénération tissulaire profonde et puissant effet anti-inflammatoire.',detalhes:'TB-500 est une forme synthétique de Thymosin Beta-4. Il favorise la régénération tissulaire profonde.',protocolo:'Dosage: 2-2.5mg 2x/semaine les 4-6 premières semaines, puis 1x/semaine.',beneficios:['Régénération tissulaire','Anti-inflammatoire','Mobilité améliorée']}}}
];

// Avaliações exemplo (substituir por API real depois)
const REVIEWS_MOCK = {
  '1': [{autor:'Carlos M.',nota:5,texto:'BPC-157 incrível! Recuperei uma lesão no joelho em 3 semanas que estava me incomodando há meses.',data:'2025-03-15'},{autor:'Ana R.',nota:5,texto:'Produto de altíssima qualidade. Resultados visíveis em 2 semanas de uso.',data:'2025-04-02'}],
  '2': [{autor:'Pedro S.',nota:5,texto:'TB-500 funcionou muito bem para uma lesão no ombro. Recomendo!',data:'2025-04-10'}],
};

let qtd = 1;

function tr(k) {
  const d = window.PEPMASTERS_I18N;
  const l = localStorage.getItem('pep_lang') || 'en';
  return (d && d[k] && (d[k][l] || d[k]['en'])) || k;
}

function getLang() { return localStorage.getItem('pep_lang') || 'en'; }

function getProductInfo(p) {
  const lang = getLang();
  const i = p.i18n && p.i18n[lang] ? p.i18n[lang] : p.i18n && p.i18n['en'] ? p.i18n['en'] : {};
  return i;
}

function renderProduct(p) {
  const info = getProductInfo(p);
  const esgotado = p.estoque <= 0;
  const reviews = REVIEWS_MOCK[p.id] || [];
  const avgRating = reviews.length ? (reviews.reduce((s,r) => s+r.nota, 0) / reviews.length).toFixed(1) : null;

  document.title = p.nome + ' — PEPMASTERS';

  document.getElementById('productContainer').innerHTML = `
    <div class="product-grid">
      <div class="product-img">
        <img src="${p.img}" alt="${p.nome}" onerror="this.style.display='none'"/>
      </div>
      <div class="product-info">
        <span class="cat-badge">${info.categoria || ''}</span>
        <h1 class="product-name">${p.nome}</h1>
        ${avgRating ? `<div><span class="stars">${'★'.repeat(Math.round(avgRating))}${'☆'.repeat(5-Math.round(avgRating))}</span> <span style="font-size:.85rem;color:var(--muted)">${avgRating} (${reviews.length} reviews)</span></div>` : ''}
        <p class="product-desc">${info.descricao || ''}</p>
        <div class="product-price"><span>R$</span>${p.preco.toFixed(2).replace('.',',')}</div>
        ${esgotado ? '<button class="esgotado">Sold Out</button>' : `
        <div class="qty-row">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
        </div>
        <button class="btn-add" onclick="addToCart('${p.id}')">Add to Cart</button>`}
      </div>
    </div>

    <div class="info-tabs">
      <button class="tab-btn active" onclick="showTab('details',this)">Details</button>
      <button class="tab-btn" onclick="showTab('protocol',this)">Protocol</button>
      <button class="tab-btn" onclick="showTab('benefits',this)">Benefits</button>
    </div>
    <div id="tab-details" class="tab-content active"><p>${info.detalhes || info.descricao || ''}</p></div>
    <div id="tab-protocol" class="tab-content"><p>${info.protocolo || 'Contact us for protocol information.'}</p></div>
    <div id="tab-benefits" class="tab-content"><ul>${(info.beneficios||[]).map(b=>'<li>'+b+'</li>').join('')}</ul></div>

    <div class="reviews-section">
      <div class="section-title">Reviews</div>
      ${reviews.length ? `
        <div class="rating-summary">
          <span class="rating-big">${avgRating}</span>
          <div>
            <div class="stars">${'★'.repeat(Math.round(avgRating))}${'☆'.repeat(5-Math.round(avgRating))}</div>
            <div style="font-size:.8rem;color:var(--muted)">${reviews.length} review${reviews.length>1?'s':''}</div>
          </div>
        </div>
        ${reviews.map(r=>`
          <div class="review-card">
            <div class="review-header">
              <span class="review-author">${r.autor}</span>
              <span class="review-date">${r.data}</span>
            </div>
            <div class="stars" style="font-size:.9rem;margin-bottom:6px">${'★'.repeat(r.nota)}${'☆'.repeat(5-r.nota)}</div>
            <p class="review-text">${r.texto}</p>
          </div>`).join('')}` : '<p style="color:var(--muted);font-size:.9rem">No reviews yet. Be the first!</p>'}

      <div class="review-form">
        <h4>Write a Review</h4>
        <div class="star-select" id="starSelect">
          <span onclick="setStar(1)">★</span><span onclick="setStar(2)">★</span>
          <span onclick="setStar(3)">★</span><span onclick="setStar(4)">★</span>
          <span onclick="setStar(5)">★</span>
        </div>
        <input class="form-input" id="reviewName" placeholder="Your name" type="text"/>
        <textarea class="form-input" id="reviewText" placeholder="Share your experience..."></textarea>
        <button class="btn-review" onclick="submitReview('${p.id}')">Submit Review</button>
      </div>
    </div>`;
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
}

let selectedStars = 0;
function setStar(n) {
  selectedStars = n;
  document.querySelectorAll('#starSelect span').forEach((s,i) => {
    s.classList.toggle('on', i < n);
  });
}

function changeQty(d) {
  qtd = Math.max(1, qtd + d);
  const el = document.getElementById('qtyNum');
  if (el) el.textContent = qtd;
}

function addToCart(id) {
  const p = CATALOGO.find(x => x.id === id);
  if (!p) return;
  try {
    const c = JSON.parse(localStorage.getItem('pep_carrinho') || '[]');
    const info = getProductInfo(p);
    const idx = c.findIndex(i => i.id === id);
    if (idx >= 0) c[idx].quantidade += qtd;
    else c.push({id: p.id, nome: p.nome, img: p.img, categoria: info.categoria, preco: p.preco, quantidade: qtd});
    localStorage.setItem('pep_carrinho', JSON.stringify(c));
    showToast(p.nome + ' × ' + qtd + ' added to cart!');
  } catch(e) {}
}

function submitReview(prodId) {
  const nome  = document.getElementById('reviewName').value.trim();
  const texto = document.getElementById('reviewText').value.trim();
  if (!selectedStars) { showToast('Please select a rating!'); return; }
  if (!nome || !texto) { showToast('Please fill all fields!'); return; }
  // Salvar no localStorage por enquanto
  const key = 'reviews_' + prodId;
  const reviews = JSON.parse(localStorage.getItem(key) || '[]');
  reviews.push({autor: nome, nota: selectedStars, texto: texto, data: new Date().toISOString().split('T')[0]});
  localStorage.setItem(key, JSON.stringify(reviews));
  showToast('Review submitted! Thank you.');
  document.getElementById('reviewName').value = '';
  document.getElementById('reviewText').value = '';
  selectedStars = 0;
  document.querySelectorAll('#starSelect span').forEach(s => s.classList.remove('on'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init — pegar produto da URL
(function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { window.location.href = 'index.html'; return; }
  
  // Buscar dados do produto na API
  fetch('/api/produtos').then(r => r.json()).then(lista => {
    const p = CATALOGO.find(x => x.id === id);
    if (!p) { window.location.href = 'index.html'; return; }
    const api = lista.find(x => String(x.id) === String(id));
    p.estoque = api ? parseInt(api.estoque) : 10;
    p.preco   = api ? parseFloat(api.preco) : p.preco;
    renderProduct(p);
  }).catch(() => {
    const p = CATALOGO.find(x => x.id === id);
    if (!p) { window.location.href = 'index.html'; return; }
    p.estoque = 10;
    renderProduct(p);
  });
})();
</script>
</body>
</html>
