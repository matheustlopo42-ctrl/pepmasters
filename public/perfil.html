<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Meu Perfil — PEPMASTERS</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --amber:#FFB300; --red:#E8220A; --orange:#FF6B00;
      --cream:#FFF8F0; --warm-white:#FFFDF9; --dark:#1C0A00;
      --mid:#3D1A00; --muted:#7A4A2A; --border:#FFD580;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Barlow',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column}

    /* HEADER */
    header{background:var(--warm-white);border-bottom:3px solid var(--amber);padding:0 24px;height:68px;display:flex;align-items:center;gap:20px;box-shadow:0 2px 20px rgba(255,179,0,.2);position:sticky;top:0;z-index:100}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-wrap img{height:40px;width:40px;object-fit:contain}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .back-link{margin-left:auto;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-decoration:none}
    .back-link:hover{color:var(--orange)}

    /* LAYOUT */
    main{flex:1;max-width:820px;margin:0 auto;padding:44px 24px;width:100%;display:grid;grid-template-columns:240px 1fr;gap:28px;align-items:start}

    /* SIDEBAR PERFIL */
    .profile-sidebar{background:#fff;border-radius:18px;padding:28px 22px;border:1px solid #FFE5B0;box-shadow:0 4px 20px rgba(255,179,0,.08);text-align:center}
    .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--orange));display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 14px;box-shadow:0 4px 16px rgba(232,34,10,.25)}
    .profile-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;color:var(--dark);margin-bottom:4px}
    .profile-email{font-size:.82rem;color:var(--muted);margin-bottom:20px;word-break:break-all}
    .sidebar-nav a{display:block;padding:10px 14px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.04em;text-transform:uppercase;color:var(--mid);text-decoration:none;margin-bottom:4px;transition:all .2s;text-align:left}
    .sidebar-nav a:hover{background:#FFF3D0;color:var(--orange)}
    .sidebar-nav a.active{background:linear-gradient(135deg,rgba(232,34,10,.08),rgba(255,107,0,.08));color:var(--red);border-left:3px solid var(--red)}
    .btn-sair{width:100%;margin-top:18px;padding:9px;background:none;border:2px solid #FFE5B0;border-radius:8px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:all .2s}
    .btn-sair:hover{border-color:var(--red);color:var(--red)}

    /* PAINEIS */
    .panels{}
    .panel{background:#fff;border-radius:18px;padding:28px;border:1px solid #FFE5B0;box-shadow:0 4px 20px rgba(255,179,0,.08);margin-bottom:20px}
    .panel h2{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.2rem;text-transform:uppercase;letter-spacing:.04em;color:var(--dark);margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid var(--border)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);margin-bottom:5px}
    input{width:100%;padding:11px 13px;border:2px solid var(--border);border-radius:8px;font-size:.93rem;font-family:'Barlow',sans-serif;color:var(--dark);background:var(--warm-white);outline:none;transition:border-color .2s}
    input:focus{border-color:var(--orange)}
    input[disabled]{background:#F5F5F5;color:#aaa;cursor:not-allowed}
    .btn-primary{padding:11px 28px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.08em;text-transform:uppercase;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 14px rgba(232,34,10,.28);transition:transform .15s}
    .btn-primary:hover{transform:translateY(-1px)}
    #msgOk{background:#F0FFF4;border-left:4px solid #22c55e;padding:9px 13px;border-radius:8px;font-size:.87rem;color:#15803d;margin-bottom:14px;display:none}
    #msgErro{background:#FFF0EE;border-left:4px solid var(--red);padding:9px 13px;border-radius:8px;font-size:.87rem;color:var(--red);margin-bottom:14px;display:none}
    #msgSenhaOk{background:#F0FFF4;border-left:4px solid #22c55e;padding:9px 13px;border-radius:8px;font-size:.87rem;color:#15803d;margin-bottom:14px;display:none}
    #msgSenhaErro{background:#FFF0EE;border-left:4px solid var(--red);padding:9px 13px;border-radius:8px;font-size:.87rem;color:var(--red);margin-bottom:14px;display:none}

    /* RESPONSIVO */
    @media(max-width:680px){
      main{grid-template-columns:1fr}
      .profile-sidebar{display:none}
      .form-row{grid-template-columns:1fr}
    }

    footer{background:var(--dark);color:rgba(255,255,255,.4);text-align:center;padding:16px;font-size:.8rem}
    footer a{color:rgba(255,179,0,.5);text-decoration:none}
      header{background:var(--warm-white);border-bottom:3px solid var(--amber);padding:0;height:68px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(255,179,0,.2)}
    .header-inner{max-width:1200px;width:100%;margin:0 auto;padding:0 24px;height:68px;display:flex;align-items:center;gap:8px;flex-wrap:nowrap}
    .logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
    .logo-wrap img{height:40px;width:40px;object-fit:contain}
    .logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;background:linear-gradient(135deg,var(--red),var(--orange),var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
    .back-link{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);text-decoration:none;white-space:nowrap}
    .back-link:hover{color:var(--orange)}
    .back-link-mobile{display:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.2rem;color:var(--muted);text-decoration:none;padding:0 4px}
    .cart-btn{position:relative;background:none;border:2px solid var(--border);border-radius:10px;padding:5px 10px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;color:var(--mid);transition:all .2s;white-space:nowrap}
    .cart-btn:hover{border-color:var(--orange);color:var(--orange)}
    .cart-count{background:var(--red);color:#fff;border-radius:50%;width:20px;height:20px;font-size:.65rem;font-weight:800;display:none;align-items:center;justify-content:center;margin-left:2px}
    .cart-count.show{display:flex}
    .btn-login{padding:5px 10px;border:2px solid var(--red);border-radius:8px;color:var(--red);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;transition:all .2s;white-space:nowrap}
    .btn-login:hover{background:var(--red);color:#fff}
    .btn-cadastro{padding:5px 10px;background:linear-gradient(135deg,var(--red),var(--orange));border-radius:8px;color:#fff;text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
    @media(max-width:600px){.back-link{display:none}.back-link-mobile{display:inline}}
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="back-link-mobile">←</a>
    <a href="index.html" class="logo-wrap">
      <img src="img/logo.png" onerror="this.style.display='none'"/>
      <span class="logo-text">PEPMASTERS</span>
    </a>
    <div class="header-right">
      <a href="index.html" class="back-link">← Início</a>
      <div id="authArea"></div>
      <button class="cart-btn" onclick="abrirCarrinho()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg>
        <span data-i18n="nav.cart">Cart</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
</header>

<main>
  <!-- SIDEBAR -->
  <div class="profile-sidebar">
    <div class="avatar" id="avatarIcon">\ud83d\udc64</div>
    <div class="profile-name" id="sideNome">—</div>
    <div class="profile-email" id="sideEmail">—</div>
    <nav class="sidebar-nav">
      <a href="perfil.html" class="active">\ud83d\udc64 Meus Dados</a>
      <a href="meus-pedidos.html">📦 Pedidos</a>
      <a href="rastrear-pedido.html">📍 Rastrear</a>
    </nav>
    <button class="btn-sair" onclick="sair()">Sair da conta</button>
  </div>

  <!-- PAINEIS -->
  <div class="panels">

    <!-- Dados pessoais -->
    <div class="panel">
      <h2>\ud83d\udc64 Dados Pessoais</h2>
      <div id="msgErro"></div>
      <div id="msgOk"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" disabled/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14"/>
        </div>
        <div class="form-group">
          <label>Telefone</label>
          <input type="text" id="telefone" placeholder="(00) 00000-0000" maxlength="15"/>
        </div>
      </div>

      <button class="btn-primary" onclick="salvarDados()">Salvar alterações</button>
    </div>

    <!-- Alterar senha -->
    <div class="panel">
      <h2>\ud83d\udd12 Alterar Senha</h2>
      <div id="msgSenhaErro"></div>
      <div id="msgSenhaOk"></div>

      <div class="form-group">
        <label>Senha atual</label>
        <input type="password" id="senhaAtual" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Nova senha</label>
          <input type="password" id="novaSenha" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"/>
        </div>
        <div class="form-group">
          <label>Confirmar</label>
          <input type="password" id="confirmarSenha" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022"/>
        </div>
      </div>

      <button class="btn-primary" onclick="alterarSenha()">Alterar senha</button>
    </div>

  </div>
</main>

<footer>\u00a9 2025 PEPMASTERS — <a href="index.html">Voltar à loja</a></footer>

<script>
  const token = localStorage.getItem('pep_token');
  const nome  = localStorage.getItem('pep_nome');

  if (!token) { location.href = 'login.html?redirect=perfil.html'; }

  // \u2500\u2500 INIT \u2500\u2500
  async function init() {
    // sidebar
    document.getElementById('sideNome').textContent  = nome || '—';

    try {
      const res  = await fetch('/api/perfil', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      if (!res.ok) { sair(); return; }

      document.getElementById('nome').value     = data.nome    || '';
      document.getElementById('email').value    = data.email   || '';
      document.getElementById('cpf').value      = data.cpf     || '';
      document.getElementById('telefone').value = data.telefone|| '';
      document.getElementById('sideEmail').textContent = data.email || '';

      // avatar inicial do nome
      const ini = (data.nome || 'U')[0].toUpperCase();
      document.getElementById('avatarIcon').textContent = ini;
    } catch {
      document.getElementById('email').value = '';
    }
  }

  // \u2500\u2500 SALVAR DADOS \u2500\u2500
  async function salvarDados() {
    const nome     = document.getElementById('nome').value.trim();
    const cpf      = document.getElementById('cpf').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    if (!nome) { mostrarErro('O nome não pode ficar vazio.'); return; }

    try {
      const res  = await fetch('/api/perfil', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ nome, cpf, telefone })
      });
      const data = await res.json();
      if (!res.ok) { mostrarErro(data.erro || 'Erro ao salvar.'); return; }

      localStorage.setItem('pep_nome', nome);
      document.getElementById('sideNome').textContent = nome;
      mostrarOk('Dados atualizados com sucesso!');
    } catch { mostrarErro('Erro de conexão.'); }
  }

  // \u2500\u2500 ALTERAR SENHA \u2500\u2500
  async function alterarSenha() {
    const atual     = document.getElementById('senhaAtual').value;
    const nova      = document.getElementById('novaSenha').value;
    const confirmar = document.getElementById('confirmarSenha').value;

    if (!atual || !nova) { mostrarSenhaErro('Preencha todos os campos.'); return; }
    if (nova !== confirmar) { mostrarSenhaErro('As senhas não conferem.'); return; }
    if (nova.length < 6)   { mostrarSenhaErro('A nova senha deve ter pelo menos 6 caracteres.'); return; }

    try {
      const res  = await fetch('/api/perfil/senha', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ senhaAtual: atual, novaSenha: nova })
      });
      const data = await res.json();
      if (!res.ok) { mostrarSenhaErro(data.erro || 'Senha atual incorreta.'); return; }

      document.getElementById('senhaAtual').value  = '';
      document.getElementById('novaSenha').value   = '';
      document.getElementById('confirmarSenha').value = '';
      mostrarSenhaOk('Senha alterada com sucesso!');
    } catch { mostrarSenhaErro('Erro de conexão.'); }
  }

  function sair() {
    localStorage.removeItem('pep_token');
    localStorage.removeItem('pep_nome');
    location.href = 'index.html';
  }

  // \u2500\u2500 MENSAGENS \u2500\u2500
  function mostrarErro(msg)     { const e = document.getElementById('msgErro');    e.textContent=msg; e.style.display='block'; document.getElementById('msgOk').style.display='none'; }
  function mostrarOk(msg)       { const e = document.getElementById('msgOk');      e.textContent=msg; e.style.display='block'; document.getElementById('msgErro').style.display='none'; }
  function mostrarSenhaErro(msg){ const e = document.getElementById('msgSenhaErro'); e.textContent=msg; e.style.display='block'; document.getElementById('msgSenhaOk').style.display='none'; }
  function mostrarSenhaOk(msg)  { const e = document.getElementById('msgSenhaOk');  e.textContent=msg; e.style.display='block'; document.getElementById('msgSenhaErro').style.display='none'; }

  // \u2500\u2500 M\u00c1SCARAS \u2500\u2500
  document.getElementById('cpf').addEventListener('input', function(){
    let v=this.value.replace(/\\D/g,'').slice(0,11);
    v=v.replace(/(\\d{3})(\\d)/,'$1.$2').replace(/(\\d{3})(\\d)/,'$1.$2').replace(/(\\d{3})(\\d{1,2})$/,'$1-$2');
    this.value=v;
  });
  document.getElementById('telefone').addEventListener('input', function(){
    let v=this.value.replace(/\\D/g,'').slice(0,11);
    if(v.length>6) v=v.replace(/^(\\d{2})(\\d{5})(\\d{0,4})/,'($1) $2-$3');
    else if(v.length>2) v=v.replace(/^(\\d{2})(\\d*)/,'($1) $2');
    this.value=v;
  });

  init();
</script>

<script src="i18n.js"></script>
<script src="i18n-init.js"></script>
<script>
function abrirCarrinho(){window.location.href='checkout.html';}
function logout(e){e.preventDefault();localStorage.removeItem('pep_token');localStorage.removeItem('pep_nome');window.location.href='index.html';}
function renderAuth(){
  var area=document.getElementById('authArea');
  if(!area)return;
  var token=localStorage.getItem('pep_token');
  var nome=localStorage.getItem('pep_nome');
  var d=window.PEPMASTERS_I18N||{};
  var l=localStorage.getItem('pep_lang')||'en';
  var tr=function(k){return(d[k]&&(d[k][l]||d[k]['en']))||k;};
  if(token&&nome){
    area.innerHTML='<span style="font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.78rem;color:var(--muted);white-space:nowrap">'+tr('nav.hello')+', '+nome.split(' ')[0]+'</span>'+
      '<a href="meus-pedidos.html" class="btn-login">'+tr('nav.orders')+'</a>'+
      '<a href="#" class="btn-login" onclick="logout(event)">'+tr('nav.logout')+'</a>';
  } else {
    area.innerHTML='<a href="login.html" class="btn-login">'+tr('nav.login')+'</a>'+
      '<a href="cadastro.html" class="btn-cadastro">'+tr('nav.register')+'</a>';
  }
}
function updateCartCount(){
  try{
    var c=JSON.parse(localStorage.getItem('pep_carrinho')||'[]');
    var n=c.reduce(function(s,i){return s+i.quantidade;},0);
    var el=document.getElementById('cartCount');
    if(el){el.style.display=n>0?'flex':'none';el.textContent=n;}
  }catch(e){}
}
window.addEventListener('DOMContentLoaded',function(){renderAuth();updateCartCount();});
</script>
</body>
</html>
